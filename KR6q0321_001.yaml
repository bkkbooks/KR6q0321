body:
  text: 環溪和尚初住建寧府瑞巖禪寺語錄參學覺此編師於淳祐六年良月入院指三門云盡大地是門橫開竪闢通霄有活路七穴八穿諸人到這裏切忌容易進步何故不見道入門問諱佛殿黃面瞿曇有沒量罪過瑞巖因甚禮拜燒香一任傍人道短長方丈從上諸佛諸祖於無窠窟中做成窠窟活陷平人無出氣處瑞巖今日從頭剖析盡底撤開向空劫已前與諸人相見莫有俊快底麼良久三十年後拈衣自曹溪已後法周沙界衣止不傳且道此衣從甚處得來西天鷲嶺東土黃梅法座此座高廣吾不能升淹彩殺人𠌲惶殺人今日快便難逢為他拔本去遂驟步登座拈香云此一瓣香爇向鑪中恭為今上皇帝祝延聖壽萬歲萬歲萬萬歲次拈香云此一瓣香奉為判府節制都運大卿暨闔府尊官判縣郎中資陪祿筭次拈香云此一瓣香懷藏久矣從上佛祖尚討頭鼻不著諸方老宿怎知氣息有無遍游湖海三十年惟有無準較些子今日當陽一爐爇却初非報德酬恩且要熏夫炙地遂趺座問答不錄乃云釋迦不出世盡大地人成佛多時達磨不西來亘塵剎海談禪不歇恁麼會得便知一上座未離徑塢已與扣氷古佛赤體相挨今到瑞巖元共國一祖師眉毛𤺊結溪山有異雲月是同既然雲月是同說甚溪山有異直得車書混一天地清寧一人高拱無為萬國咸歸至化且太平無象一句作麼生道但見皇風成一片不知何處是封疆復舉僧問曹山佛未出世時如何山云曹山不如僧云出世後如何山云不如曹山師拈云大小曹山名喧宇宙氣衝牛斗恁麼答這僧話直是未在今日或有問新瑞巖佛未出世時如何瑞巖不如出世後如何不如瑞巖須是恁麼始得當晚小參明鏡當臺妍醜自現吹毛在手殺活臨時恁麼恁麼南斗東轉北斗西移不恁麼不恁麼冬月震雷夏天灑雪多添少減與有奪無不墮平常獨超象外只如恁麼中不恁麼不恁麼中却恁麼時如何良久云無人知此意令我憶南泉復舉台州瑞巖彥禪師問夾山云與麼即易不與麼即難與麼與麼即惺惺不與麼不與麼即居空界與麼不與麼請師速道山云老僧謾闍黎去也彥喝云這老和尚而今是什麼時節便出去後有僧舉似巖頭頭云苦哉將我一枝佛法與麼流將去師拈云瑞巖逞俊太過元不知有佛法道理因甚巖頭却道苦哉將我一枝佛法與麼流將去且道是肯他不肯他留兩班上堂是法住法位世間相常住佛殿對三門燈籠掛露柱移易一絲毫不得增減一絲毫不得或有个出來道長老昨日是孟冬月晦今日是仲冬月旦夜愈長晝愈短日月更相換如何說箇不移易不增減底道理只向他道瑞巖寺裏知事頭首昨日不少今日不多增減得麼各安己分各務本職移易得麼不見古人有言不愆不忘率由舊章上堂浴氷橋畔伏虎巖前雪消松杪春到梅邊古佛眼睛突出瞿曇面目昭然認著依前隔大千佛成道上堂夜夜明星現有眼誰不見此夜老瞿曇却被明星轉直至而今双眼花無瑕白玉自生瑕謝兩班上堂法無定相遇緣即宗如水在地如雲行空或卷或舒或西或東鼓際天雲濤而有江澄練淨底消息沛翻盆驟雨不無天開日霽之形容其用也不有其德其寂也不居其功且道是什麼物得恁麼靈良久云任從滄海變終不為君通元宵上堂和暖上元天氣是處笙歌動地瑞巖無可設施隨分放燈一二以拂子作彎弓勢依俙初月又點三點彷彿三星輝映群芳光吞萬象毗嵐遍界不能息滅金蓮萬斛未易比方焰焰熾然明明無盡然雖如是汝等諸人折旋俯仰動轉施為總在這箇光明藏裏因甚十箇有五双面前黑漆漆地以拂子擊禪床云只為分明極翻令所得遲上堂今朝十五明朝十六瓠苦瓜甜松直棘曲辟支老漢炎夏衣楮嚴冬浴氷謾自辛勤徒勞檢束爭似而今禪和三三兩兩水邊林下寒向火熱乘凉又誰管你地覆天翻天翻地覆雖然如是是玉也大奇只恐不是玉上堂露冷風清山空月明天際歸鴻書梵字夜深砧杵送秋聲眼不見耳聽不聞與君傾盡此時心莫認山河作眼睛古佛忌上堂伏虎巖前螺江江上一去一來無去來相諸人要識無去來相麼良久云今朝古辟支昔日翁和尚謝兩班上堂權衡佛祖號令人天擒縱予奪各得其宜進退存亡不失其正要明如是事須是如是人既得如是人方明如是事如是事則且置我此一眾還有如是人麼鸑鷟麒麟皆是瑞旃檀薝蔔一般香上堂微雨潤枯荄嚴風攪林木梅唇已破香柳眼眠未足塵世競奔忙光景相追逐林間無事人好唱雲門曲只如雲門曲作麼生唱良久云今朝臘月二十五明朝臘月二十六上堂今日上元令節雨意連綿未歇過去燃燈如來全體一時漏泄諸人還見麼簷頭滴滴分明歷歷上堂人人頭頂天脚踏地眼裏放光鼻孔出氣缺齒老胡何用單傳直指宜乎打落當門齒雖然如是不因樵子徑爭到葛洪家上堂拈拄杖召大眾云山僧從春及夏袞袞地過殊無一言半句資益諸人子細思量恁麼住山誠然無益昨日偶因無思惟中得个三昧頗似奇特今朝擊皷陞堂舉似諸人也要大家知有惟是諸人得此三昧善自護持百劫千生莫教忘却卓一下云會麼大事為你不得小事各自祗當靠拄杖下座出鄉歸上堂建嶺雲建溪水縹緲無邊淵深無底盡情收拾歸來點滴無非珍貴拋向諸人面前切忌自生擬議何故見之不取思之千里上堂禪禪風生木杪葉墜庭前唧唧寒蛩吟破壁聲聲歸雁度遼天諸人若也會得此去吳屯不遠若也不會藍溪水透洋邊阿呵呵笑倒武夷張大僊上堂皎潔中秋月清光處處同是人皆照破無水不形容圓滿纖塵淨婆娑桂影重古今爭賞翫誰到廣寒宮莫有曾到底麼良久云三生六十劫九日道舊至上堂舊日重陽今日重陽籬菊披金淺淺黃休訝去年蓬𩯭今歲半成霜喜得同人相訪那邊風景此間風景且莫論量相與對花賒一醉高歌大笑手舞足蹈聽教人道掣顛狂因甚如此不見道有朋自遠方來不亦樂乎開爐上堂拈起拂子召大眾云這些火種混沌未判威音未生光炟赫地已難掩遏無端被迦文老漢指天指地從而噓之菩提達磨逾海越漠扇而東之賣柴漢子拖一束薪發而揚之由是東西浩浩南北紛紛千種施為萬般作用欲彰之而深晦欲益之而䆮微逮至今日或幾乎息矣東山試向冷灰裏打一撥看以拂子劃一劃云見麼雖然煙焰無多子近著須防燎面門古佛忌日上堂虎溪氷瑩長空月鳳嶺松吟後夜風堪笑堪悲翁老子儼然不改舊時容諸人還見麼遂拖拄杖下座上堂可祖齊腰立雪長慶坐破蒲團一人鐵壁要透一人滄海瀝須乾鐵壁透滄海乾出禮三拜依位立捲起簾來天下寬堪悲堪笑何易何難信道梅花香撲鼻須是徹骨一番寒元宵謝綺都寺上堂羅綺叢中笙歌社裏燈明如來放光現瑞諸人還見麼良久云過去久矣謝執事上堂東山開箇小小戲場編排佛祖拈弄不到底科段然而單絲不成線獨掌不浪鳴須是諸人大家攛掇始得所謂唱底唱拍底拍絲竹互奏金石交陳山僧贏得於其中間舉其宏綱撮其機要卷舒進退開闔翕張或現鬼面神頭或伸佛手驢脚千變萬化七縱八橫傍人看來只眨得眼且道是神通妙用法爾如然還會麼不見道但看棚頭弄傀儡抽牽總在裏頭人上堂秋風捲地秋水連天千山影瘦萬木蕭然漁笛數聲江上月樵歌一曲嶺頭烟諸人聞恁麼告報切忌作境話會既不作境話會畢竟作麼生會良久云佛身充滿於法界普現一切眾生前敘謝監寺藏主知客直歲寮元侍者上堂楊岐三脚驢虎丘睡虎子毛色既一同蹄爪亦相似祖域交馳卒難搆赴須是具客來則接賊來則打底手脚有插鍬而立携鍬便行底機用方可恰恰相當其或未然犀牛扇子起清風披拂旃檀香滿空上堂拈拄杖召大眾云火爐頭有則無賓主話自古自今浩浩商量商量不下瑞巖有舌如結有口如啞且聽拄杖子為諸人分明說破去也卓一下云上下三指彼此七馬上堂召大眾云達磨西來踰海越漠遊梁歷魏明什麼邊事良久云會麼知我者謂我心憂不知我者謂我何求住臨江軍瑞篁山惠力禪寺語錄參學編指三門云無礙慧門鐵壁鐵壁一擊擊開不勞餘力幾人把手拽不入踞方丈橫一丈竪一丈滿室風生半窻月上山僧要坐便坐要起便起終不向這裏無風起浪諸人若不散去照顧劈脊拄杖陞座祝聖罷問答不錄乃云目視雲霄有一拳未敢分付日遊閙市三十棒且待別時遇坎則止乘流而行既無跡於去來寧有心於動靜昨日恁麼逸翮獨翔孤風絕侶今日不恁麼翫江月聽松風拈起閤皂山濃蘸清江水平展金鳳洲寫出祖師意貼向十字街頭俾人人知道一年十二月臘月是年尾寶祐改元又從頭起萬年萬年更萬年清江依舊清無底然雖如是道泰不傳天子令時清休唱太平歌復舉南泉示眾云王老師自小牧一頭水牯牛公案師頌云不如隨分納些些何處青山不是家玉笛橫吹皇化裏風前清韻徹天涯當晚小參入作無門面前如鐵壁放開線路水上按葫蘆如轉輪藏八面玲瓏轉轆轆地了無滯礙底時節如觀空閣十方通暢虗豁豁地了無窒塞底時節既無窒塞又無滯礙無往而不通無施而不可縱橫得妙舒卷無拘正當恁麼時如何良久云今朝有酒今朝醉明日無錢明日愁復舉德山小參不答話公案師拈云行險僥倖德山始終不移強毅果敢這僧危亡不顧惠力也有箇見處當時待德山道今夜小參不答話問話者三十棒出眾呵呵大笑教這老漢要開口也不得要合口也不得要坐也不得要起也不得然雖如是還契德山意也無具眼衲僧試甄別看留知事頭首上堂山僧自入院以來終日忙忙遍地人事欲求前日清閑豈可復得耶所幸眼睛鼻孔元只依舊三門對佛殿厨舍對僧堂也只依舊僧是僧行是行東者東西者西也只依舊然雖如是且道斬新號令又作麼生去年梅今歲柳顏色馨香依舊滿散天基聖節上堂惠力大寶藏日轉萬億帀一日萬億帀千日千萬億願以轉輪數仰祝天子壽惟願天子壽復倍轉輪數繁開玉葉茂金枝永與法輪無盡時佛涅槃上堂翠柳堤邊舞黃鸎樹上鳴瞿曇真實相歷歷在而今誰言入滅向双林無準和尚忌拈香這箇老漢殊無所解不惟屈屈曲曲且是頑頑賴賴我昔沒興見之直至而今尀耐燒炷香禮三拜喫拳打拳彼此莫怪結制上堂今朝結制號令宜先三章約法普示人天身不可妄動亦不可塊然口不可妄開亦不可默然意不可妄舉亦不可罔然依如是行如是住圓覺伽藍常現前謝秉拂上堂獅子吼無畏說百獸聞之皆腦裂如是則石龍恐怖金鳳來儀蕭水騰波瑞山嶪蕚不為分外雖然且道昨日第一座與第二座說法還有優劣也無良久云藏頭白海頭黑上堂晝也惺惺夜也惺惺既不掉舉亦不昏沉何須求白玉只此是黃金上堂召大眾云從上諸佛諸祖千種施為萬般方便只要諸人知得冬寒夏熱夜闇晝明三旬一月一月三句以拂子擊禪床云會麼頻呼小玉元無事只要檀郎認得聲開爐上堂夏熱乘凉冬寒向火自古自今總恁麼過不知二祖立雪齊腰畢竟圖箇什麼良久云會麼以吾之不可學柳下惠之可上堂無禪不參無道可學只貴諸人如醉而醒如夢而覺醉既醒夢既覺雖然只是舊時人却與舊時相遼邈住隆興府泐潭山寶峯禪寺語錄參學編指三門云從上諸佛諸祖皆從此門而入且道如何是此門良久云有人動著關棙兩扇東扇西扇佛殿德山拆殿寶峯燒香二俱不惡一種不臧瞿曇元自面皮黃陞座祝聖罷問答不錄乃云法無定相遇緣即宗至道無難惟嫌揀擇真如不守自性隨緣應用萬差高謝古劒津垂楊兩岸一片沙鷗管領獨秀峰滴翠千尋羣飛野鴨廣漢簸箕拈起東簸西簸關西水磨試把左推右推贊化育於兩間致昇乎於四海普天和氣匝地春風正恁麼時功歸何所良久云千峯朝華嶽萬派肅滄溟復舉三聖道我逢人即出出則不為人興化道我逢人即不出出則便為人真淨云這兩箇老古錐竊得臨濟些子活計各自分疆列界使明眼衲僧只得好笑師云真淨恁麼批判只見錐頭利不見鑿頭方亦使明眼衲僧只得好笑殊不知二大老兄不兄弟不弟自相矛盾喪盡臨濟門風新寶峰恁麼批判且道還免衲僧笑麼具眼者辨取當晚小參泐潭之潭澄澄浸月寶峰之寶焰焰發輝親到此峰必獲此寶既獲此寶直須擊碎不留影迹始得親到此潭直須吸乾了無涓滴始得然後於無涓滴處興雲作雨霑溉大地草木而不作霑溉之想於無影迹處開無盡藏賑濟一切貧窮而不起賑濟之念便見貧窮富足草木敷榮無一物不遂其生無一夫或失其所然雖如是忽被山僧拂子將泐潭寶峰一口吞却是汝諸人向甚處安身立命以拂子擊禪床云切不得離却這裏復舉馬祖大師因僧問參次祖𦘕一圓相云入也打不入也打僧纔入祖便打僧云和尚打某甲不得祖靠拄杖休去師拈云馬祖𦘕出這个圈子盡大地人跳不出這僧恁麼祗對且道還跳得出麼留兩班并謝新命日光長老上堂召大眾云萬般施設不如常又不驚人又久長山僧自入院以來傷風咳嗽一般無可施設喜得大寂祖師面目元只如常見前大眾頭頂天脚踏地元只如常東邊底辨取東邊事西邊底辨取西邊事元只如常日裏三飡夜間一寢元只如常雖則如常就中却有些子驚人處昨朝陰雲四合雨正霶霶之際忽然一道日光從南而下把泐潭山千巖萬壑透頂透底一一融通不知日光之為泐潭泐潭之為日光所謂其光遍滿無壞無雜見者聞者歡喜踊躍皆曰希有之事驚人之舉雖則驚人要且久長如何見得不見道佛法無多子久長全在人延慶佑聖二長老至上堂召大眾云開門待知識知識喜來過兩兩不成雙一一無回互共臥不共床同行不同步昭然在目前目前不可覩雖則不可覩我獨知其故諸人還知麼良久云聖容菩薩來西天盧仙夏人在東土再住寶峰上堂雲無心而出岫功不浪施水有時而回淵法無定相行固不厭住亦不忻昨從主而為賓去不出門今從賓而為主來不入戶既不出門又不入戶明明來去無來去歷歷主賓非主賓泐潭元自碧沉沉獨秀依前高突兀然雖如是只如再呈舊面重理新詞一句又作麼生擊拂子云拍拍是令謝管幹撥田上堂舉東山演祖頌云山前一片閑田地叉手叮嚀問祖翁幾度賣來還自買為憐松竹引清風老東山雖則買賣自由末上未免叉手問人在寶峰即不然山前一片閑田地無意求之却宛然幾許風光都買盡不曾費著一文錢解制上堂今朝解制且作麼生從前約束一槩放行萬里秋天飛一鶚東西南北任縱橫九月旦雲居歸上堂昨從天上去元不離地下今歸地下來亦不離天上上下無間來去無差天河秋一雁砧杵夜千家上堂十五日已前即心即佛十五日已後非心非佛正當十五日不是心不是佛不是物便恁麼會頭上安頭不恁麼會斬頭覓活總不恁麼時如何良久云丁人干千上下十卜開爐日白塔東山二老并維那道士至上堂召大眾云悅分忽其中有物是什麼物忽分悅其中有象是什麼象依俙鈿斧之既閑彷彿砧槌之已放泐潭不欲破二作三重重起模畫樣恍忽忽恍置而勿論物象象物亦休定當今日開爐且燒火向佛成道日上堂六年雪嶺竟無成練得身形似鶴形盡謂見明星悟道何曾悟道見明星入山何富出山何貧知心能幾人基首座本藏主昭侍者至上堂召大眾云參禪學道竪起拂子此為基本儻得基本可以為人天眼目作叢林表儀演出一大藏演入一大藏無施不可其或未然布毛吹起處子細好生觀佛涅槃上堂拈拄杖召大眾云世尊最初於般若會上垂教云若以色見我以音聲求我是人行邪道不能見如來末後却於涅槃會上以手摩胷告眾云汝等善觀吾紫磨金色之身瞻仰取足無令後悔這老漢顯異或眾前後相違業既自作悔不容追昔年已陷泥犁去卓一下云今日重移過鐵圍上堂春風料峭春雨連綿桃花逐浪新竹籠煙香嚴已往靈雲去一度春深一愴然上堂召大眾云乾坤之內宇宙之間中有一寶祕在形山所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉轉風且道寶在什麼處良久云桑疇雨過羅紈膩麥隴風來餅餌香無準和尚忌日拈香這老凍儂惺惺懵懂分明無一絲毫剛道有三斤重只知恁麼脫空相誑不知其讎甚於戴天之不共瓣香今爇夫何為願百劫千生永陷泥犁無出期城歸上堂舉南禪師道去時一溪流水送歸來滿谷白雲迎一身去住非去住一物無情似有情師云大小南禪師話作兩橛既是去住非去住爭得有送迎寶峰即不然去從閙市紅塵去歸向白雲深處歸因甚更無迎與送去來寸步不曾移上堂召大眾云細不可減大無以加近在眼睫遠過天涯是著即錯擬之又差缺齒老胡會不得空携隻履返流沙端午上堂以拂子書空云五五午時書妖邪盡掃除一堂風悄悄千古意如如蒲飲先春雪糉餐明月珠舌頭如具眼醉飽樂無餘中秋劒州生監寺綿州泰首座至上堂一月在天影含眾水只如雙劒峯頭月何似芙蓉溪上月蓉芙溪上月何似泐潭潭底月若道同東西各一涯若道別天無第二月既然如是畢竟作麼生不見道白雲巖上月太平松下影深夜秋風生都成一片境九日上方西堂至上堂召大眾云今日重陽寶峰相與諸人登高去也所謂登山不到頂不知山之高然而未到高處各宜努力切不可如存若亡直饒得到高處一覽眾山小舉手摩穹蒼亦未可在何故更有靈蹤在上方延慶長老至上堂雨暗西山雲飛南浦老盧僊腰纏騎鶴朝度黃茅八凸獨秀峰草木泉石為之鼓舞因甚如此家貧願隣富佛成道上堂拈起拂子召大眾云瞿曇未解這一著雪嶺六年空卜度不知眼病見空花認作明星一何錯自累猶可更累兒孫擊禪床云瑚枕上兩行淚半是思君半恨君上堂歲盡年窮多少人脚忙手亂惟有寶峰恬然不管何故來年更有新條在惱亂春風卒未休住隆興府黃龍山崇恩禪寺語錄參學編指三門從上佛祖建立這箇門戶只要盡大地人把手同歸新黃龍又作麼生不向如來行處行佛殿我與黃面老漢有千古不忘之恨甚欲爛槌一頓今日因甚放過老不以筋力為能方丈踞此室坐此座佛來祖來一一按過莫有超佛越祖底麼勘過了打陞香拈香祝聖罷乃云泐潭深處泛明月棹穩波平幕阜峰前對落暉鳥啼花笑此即彼彼即此拈又放放又拈打開石門於三關之前巨闢三關於石門之後俾到者到不到之地歸者歸無歸之鄉已過關者掉臂而行未過關者從門而入益無所益為無所為鼓舞皇風優游聖世正當恁麼時如何蒲團靜倚無餘事永日寥寥謝太平復舉三聖問雪峯透網金鱗未審以何為食公案師拈云金鱗振𩮻擺尾搖蕩乾坤鱉鼻噴毒揚威崩騰雲霧諸人要知二大老落處麼等閑相見處莫作等閑看當晚小參我手何似佛手十指參差我脚何似驢脚四蹄踏地人人盡有生緣如何是上座生緣耳朵兩片皮牙齒一具骨恁麼會得便見積翠老人面目見在時時與諸人同一飲同一受用不背一人不向一人念念與諸人向第二義門談不二法不住本際不離本際雖然如是因甚十箇有五双蹉過也不知拍禪床云只為分明極翻令所得遲復舉黃龍南禪師問隆慶閑禪師得坐披衣公案師拈云積翠老人何用繁詞當初待他道遇方即方遇圓即圓痛與三十棒不惟彼此免帶唇齒管取隆慶別有長處元宵興化兜率長老至上堂未離兜率已降王宮纔過一關三關俱透全賓全主全主全賓正恁麼時如何樓臺上下火照火車馬往來人看人慧日西堂蓬萊二道士至上堂以拂子畫一畫云畫斷迷雲打一圓相放開慧日照破老君肝膽脫似瞿曇𮌎臆一家胡越一合乾坤渾崙休剖破剖破又渾崙上堂拈主丈召大眾云諸人不是不將來老僧不是不分付將來既是分明分付亦非莽鹵且畢竟是箇什麼擲下主丈云各自認取上堂目前無法密密綿綿撥不開意在目前千討萬討討不見討不見却成現椶櫚葉散夜叉頭芍藥花開菩薩面佛生日上堂召大眾云世尊初生下來三業便不清淨一手指天一手指地周行七步目顧四方身業不清淨天上天下惟吾獨尊口業不清淨起此念作此說為此舉意業不清淨因此三業不清淨遂感異報一年一度受鑊湯之苦還脫得也無良久云假使百千劫所作業不忘因緣會遇時果報還自受謝秉拂上堂雨注河傾共談無義陳蒲鞋倒退三千睡虎子讓一頭地有問如何若何不能以手夾鼻何故切忌錯恠老僧上堂涅槃心差別智明之既難會之不易如千手異執千目異顧元同一身似萬派爭流百川競注皆歸一水雖然如是差之毫釐謬以千里上堂舉永嘉大師道直截根源佛所印摘葉尋枝我不能與麼已帶枝葉了作麼生得直截根源去良久云時暑不宜久立城歸上堂昨日動未常動今日靜未常靜所以道靜謂之性心在其中矣動謂之心性在其中矣只如心性俱泯動靜兩忘時如何一片白雲橫谷口數聲幽鳥語林阿解制上堂昨朝結制鎖夢關空今朝解制眼開天曉且道結底是解底是孤鶩高飛趂落霞長天一色如秋水請淨頭上堂淨桶放光籌子𨁝跳為得諸人徹困了也更教老僧說箇什麼雖然如是狼藉不少上堂古佛心即如今桂香滿院葉墜疎林水沉寒雁影露冷夜蛩吟明眼衲僧會不得江北江南徒訪尋上堂舉德山一日飯遲自托鉢至法堂上雪峯云鐘未鳴鼓未響托鉢向甚處去師着語云妄起兵端德山低頭歸方丈一鏃不施折衝千里雪峯舉似巖頭討兵救援頭云大小德山未會末後句在挾天子令諸侯德山聞得令侍者喚巖頭問云汝不肯老僧那一擒一縱巖頭遂密啟其意詐納降欵德山休去夫人既降殺之不祥山次日上堂果與尋常不同其然次豈其然乎巖頭於僧堂前撫掌呵呵大笑云且喜老漢會末後句天下人不柰伊何雖然如是只得三年恭而無禮克由叵耐師拈云大眾德山托鉢話古今以為奇特商量殊不知這老漢飢過心荒顛倒錯亂被他二子上當只得飲氣吞聲雖然如是若無舉鼎山力千里烏騅不易騎上堂今日如是明日如是一日復一日一年復一年百千萬億年究竟只如是月落烏啼霜滿天紛紛黃葉飄庭際以拂子擊床云會麼善男子起法性如是天童化主入蜀兼謝照都寺上堂照而常寂寂而常照灔澦雲開玲瓏月皎巍巍玉殿與瓊樓已見翬飛主丈頭聖節上堂寶祐五年正月初五天地泰而上下交聖人作而萬物覩巍巍乎不可極蕩蕩乎無能名黃河三千年一度清上堂舉洛浦遊歷罷往夾山頂上卓庵師着語云更須行脚始得經年夾山知乃修書令僧馳到箭不虛發浦接得便坐却再展手索僧無對浦便打云歸舉似和尚門庭施設似則也似僧回舉似夾山山云這僧看書三日內必來若不看書斯人救不得也性命已在夾山手裏三日後果來纔見夾山不禮拜當面叉手而立強惺惺棺木裏瞠眼夾山云雞捿鳳巢非其同類出去四十斤鐵槌劈頭一下浦乃云自遠趍風乞師一接一欵便招夾山云目前無闍梨此間無老僧再下一槌浦便喝伎倆已盡夾山云住住且莫草草匇匇雲月是同溪山各異截斷天下人舌頭則不無爭教無舌人解語截斷命根浦佇思一死更不再活夾山便打成始成終不打也好師云黃龍恁麼道諸人切不得恁麼會復拈云斵鼻堊者有運斤成風之手亦須受斧者有儼然不動之質然後二俱入妙夾山雖則有三千里外辨誵訛底眼目若非洛浦具舉一明三底體裁爭見針芥相投風雲際會雖然如是澤廣藏山理能伏豹元宵上堂人間月半天上月圓幸自一天明朗何須萬斛金蓮諸人睡眼豁開見得分曉不起于座即超于然燈之前其或未然燈節元來是上元上堂昨夜天氣稍凉坐久不知瞌睡偶於瞌睡三昧中夢得一段無上妙義其語簡約其理造詣及乎天曉眼開不謂一時忘却且待問主丈子看拈主丈云主丈子你還記得麼主丈子云若是無上妙義長老何曾夢見我自出廣長舌相為諸人道去也卓一下云白日青天且莫說夢靠主丈下座無準和尚忌拈香我與這老漢元自不相識於不相識中刻骨成冤結愈久冤愈深至今恨深切澆之馬渤與牛溲爇此一爐乾屎橛清溪和尚訃音至上堂海湧山摧劒池水竭嘉州大像為之含悲峩普賢泪如雨滴牽動靈源橋下水號湍漱石聲嗚咽且道因甚如此子期去不返伯牙良可哀浴佛上堂佛真法身猶若虗空還有染污也無應物現形如水中月還假灌沐也無雖然恁麼也少這一杓不得因雪上堂萬木凝寒千山積雪少室門風宛然如昔惟有龍峯却較些夜深庭際無人立上堂舉澧州夾山善會禪師初住潤州京口時道吾至上堂有僧問如何是法身答云法身無相如何是法眼答云法眼無瑕師着語云答得甚諦當切忌怕人笑道吾不覺失笑不是好笑貪他底著他底山便下座請道吾問某甲適來祗對僧話必有不是致令上座失笑望不吝慈悲果然吾云和尚一等是出世未有師在殺人刀活人劒山云某甲甚處不是望與說破實頭人難得吾云某甲終不說請和尚往秀州華亭船子和尚處去為人須為徹一舉兩得山云此人如何未見已前不妨疑着吾云此人上無片瓦下無寸土莫謗船子好和尚若去須易服束裝教人作竊禮合如是師乃散眾易服直造華亭丈夫志氣不因楊得意爭見馬相如船子纔見便問大德住什麼寺從苗辨地山云寺則不住住則不似熟處難忘船云不似又似箇什麼雖然船裏無魚明月也須搜過山云不是目前法瞞別人即得船云甚處學得來將來擒之必先縱之山云非耳目之所到伎倆已盡船云一句合頭語萬劫繫驢橛肺腑間病一時透見了也船又問垂絲千尺意在深潭離鉤三寸子何不道門上一針山擬開口船便以篙打落水中砒霜狼毒纔上船船又云道道山擬開口船又打巴豆黃連山於此有省乃點頭慚愧慚愧通身白汗藥不瞑眩厥疾弗廖船云竿頭絲線從君弄不犯清波意自殊大斧斫了手摩挲去砭劑進膏肓山遂問拋綸擲釣師意如何妙訣丹方不容不問船云絲浮綠水浮定有無之意草本不勞拈出山云語帶玄而無路舌頭談而不談開得眼來天曉船云釣盡江波金鱗始遇得箇魚兒便喜歡費力不少山乃掩耳滿面慚惶無著處船云如是如是龍頭蛇尾竹篙在什麼處船遂囑云汝向去直須藏身處沒踪跡沒踪跡處莫藏身鬼家活計吾二十年在藥山只明此事鈍根阿師汝今既得他後不得住城隍聚落但向深山裏钁頭邊覔取一箇半箇接續吾宗毋令斷絕前頭驚殺人後頭笑殺人山乃辭行頻頻回頭半是思君半恨君船遂喚闍梨山回首船竪起橈云汝將謂別有老婆心切着甚來由乃覆却船入水而去却較些子已遲八刻師拈云一言可以興一言可以喪一笑傾人城再笑傾人國每每以此語為過今觀道吾船子夾山一言一笑一得一喪乃知是真語者實語者雖然如是這裏莫有失笑者麼如無老僧自笑去也乃呵呵大笑云待別人笑堪作什麼上堂召大眾云風蕭蕭雨蕭蕭山雲漠漠庭葉飄飄普天匝地祖意活鱍鱍滿眼滿耳心印何昭昭便與麼去衲僧門下大故相遼何故行到水窮山盡處可中別有路通霄住建昌軍資聖禪寺語錄參學編指三門云盡大地是箇解脫門未甞不與諸人同出同入今日因甚特地若不如是爭知如是方丈佛來不顧祖來不顧有三十棒未敢分付何故箇中無肯路法座一著高一著一步闊一步墮在平常一著亞一著一步却一步失在𡾟嶮二俱不涉七達八通龍袖拂開全體現象王行處絕狐蹤陞座拈香祝聖罷乃云白雲深處終朝兩眼掛枯松黃葉落時旱地一聲轟霹𮦷禍從天降回避無門未免重整襴衫再呈舊面向松溪深處開箇小小戲場竪擲金圈橫拋栗棘俾未透者透未吞者吞透得過底銀山鐵壁粉碎無餘吞得下底毒藥醍醐融成一味坐斷千差萬別頓超十地三賢處處通方頭頭得妙致君堯舜上再使風俗淳鳳舞鸞翔河清海晏正當恁麼時如何殊方喜見梯山貢四野欣聞擊壤歌復舉保壽開堂三聖推出一僧保壽便打公案師拈云二大老似鶻拏鳩如鷹搦兔收來放去足有可觀子細點撿將來未免俱借這僧鼻孔出氣若要扶竪臨濟正宗且緩緩當晚小參一水護田將綠遶激揚少室家風萬山排闥送青來漏泄威音消息恁麼會得釋迦不出世達磨不西來佛法遍天下談禪口不開何必高推臨濟喝似雷奔獨羨德山棒如雨點人人脚跟下十日炳煥箇箇肉髻中百寶光明無邊剎境靡不流輝十世古今舉無遺照日月有顯晦此則未嘗有顯晦天地有盈虧此則未嘗有盈虧不離當處常湛然覓則知君不可見所以道目前無法意在目前不是目前法非耳目之所到雖則非耳目之所到爭柰意在目前雖則意在目前爭柰非耳目之所到這裏一咬咬斷一透便見夾山眼睛鼻孔元是自家鼻孔眼睛其或未然莫道西江風浪惡錢塘更有海門潮復舉南泉示眾云王老師自小牧一頭水牯牛公案師拈云馬師道惟有普願獨超物外因甚自牧一頭水牯牛莫擬如何頓放且道過在什麼處有人辨得許你親見南泉洪首座至上堂能誦法華經誦三千部曹溪一句忘塵塵皆寶所處處是家鄉雲淨天如洗潭清月愈光須知遠煙浪別有好商量上堂召大眾云直下是直下是這邊那邊滿眼滿耳綿綿兮長存湛湛兮不痕擬議依前隔海門上堂雨滴空階溪流新漲風起天末葉墜疎林喚作物却非物喚作心不是心缺齒老胡會不得九年面壁空沉吟請後堂并義糓掌會上堂摩訶衍法離四句絕百非香飯普熏遍十方窮三際我此一眾總是諸方羅籠不住底且道為法來耶為飯來耶良久云莫鈍置開爐上堂竪拂子召大眾云這箇如大火聚近之則燎却面門是汝諸人如何湊泊若也湊泊得去盛夏不熱嚴冬不寒其或未然終日雖在火爐頭未免總是凍殺底數上堂召大眾云佛法只在日用日用百發百中只如諸人折旋俯仰應對酬酢飲食起居無非日用中事且道佛法在什麼處良久云一滴水一滴凍上堂十月小春已過了三之一愛日融和脫似三春天氣西舍打禾東家盖屋終日忙忙地惟有衲僧閑不徹被閑使得沒巴鼻有巴鼻晝晴免得撥寒灰夜暖偏宜伸脚睡上堂名不得狀不得取不得舍不得不可得只麼得趙州東壁掛葫蘆觀音院裡有彌勒請耆舊修田并謝兩序上堂百丈開田說大義究竟寧免費脚手松溪修田無可說擊皷陞堂但良久知事頭首俱歡顏見者聞者皆失笑且道笑箇什麼良久云好篇大義一字不少佛涅槃上堂諸佛不出世亦無有涅槃年年二月半枉自㘅悲酸此意只今誰共委令人拍碎玉欄干上堂萬法本閑人心自閙一塵不立世界崢嶸三賢任你三賢十聖從他十聖遶四天下究竟不離這裡何故惟此一事實上堂道在諸人如春在萬物雖無形色可見而周遍於形色之間雖無聲臭可聞而著見於聲臭之內是以若草若木含英吐華無非陽春發越而然諸人含齒帶髮頂天履地居萬物之上為萬物之靈莫非道力資持而然因甚問著如何是道十箇有五雙面熱汗下鉗口結舌雖然甕裡何曾走却鼈上堂此事沒誵訛人人不柰何柰何不得處合眼跳黃河跳得後如何元來佛法苦無多結夏上堂今朝結制制如何結內不放出外不放入壁立千仞千仞壁立這箇猶是諸方普請邊事且道松溪如何喫茶珍重歇謝秉拂上堂宗通說通抹過西東無兩舌頭有雙箭鋒因甚如此閩蜀同風上堂計較不得處不知計較不得底畢竟是誰馳求不息時自是馳求者當頭蹉過不蹉過是什麼門外青山一朵兩朵三朵五朵千萬朵瑞州黃蘗山報恩光孝禪寺語錄參學編指山門云千人排門不如一人拔關且道誰是關者喝一喝佛殿德山推倒雲門打殺黃蘗燒香殷人以柏方丈這裡如大火聚近之則燎却面門直饒佛祖到來未免退身有分何故無你棲泊處法座此座高廣誑嚇阿誰吾不能升賣弄不少舍利弗恁麼新黃蘗不恁麼何故因行掉臂陞座拈香祝聖罷乃云放下松溪竿頭絲線整頓祇園舊日家風九枝榧蒼蒼一溪水清清淺淺猿啼疊嶂鳥語疎林佛法大意覿面當機黃蘗宗旨當機覿面這裡有人荷紹得去今日開堂功不浪施其或未然卓拄杖一下云只將這箇真消息仰祝吾皇億萬年復舉同光帝問興化和尚云朕收中原獲得一寶公案師拈云同光帝兩手捧來莫非至寶老興化一言合轍歡動龍顏雖然借看則易酬價則難留將千古與人看當晚小參六十山藤婆心太切三拳肋下癡漢呈乖了知佛法本無多開得眼來天大曉直饒栽種得不是棟梁材黃蘗乍到此間人事倥傯若有此等奇特後生來問佛法大意雖有拄杖未暇分付待伊走到大愚灘頭甦省歸來且緩緩地卸下衲衣痛與一頓免得上頭上面𮞏相鈍置雖然若無舉鼎山力千里烏騅不易騎復舉當山祖師示眾云汝等諸人盡是噇酒糟漢公案師云諸人要見祖師麼眼高四海空無人氣吞餘子不足數上堂春雪乍晴春光愈好不必遠討幽探不用談空說有何故村村自花柳上堂拈拄杖召大眾云登山須到頂入海須到底登山不到頂不知山之高入海不到底不知海之深海深所以容魚龍山高所以容虎豹提起拄杖云只如拄杖子身材既小高又不高深又不深且道容得箇什麼卓一下云此中空洞渾無物何止容君數百人靠拄杖下座上堂心不是佛智不是道拋却深村又入荒草只如以一重去一重不知轉交涉轉料掉畢竟如何心不是佛智不是道上堂召大眾云九十春光已過了三之二是處園林減紅添翠鶯遷喬木燕壘新巢也自忙忙地衲僧門下又且如何鑪香靜坐一物不為日日一般朝朝如是拍禪床云未能如是安能如是上堂一明一切明一了一切了道無不是無道有元非有毗婆尸佛早留心直至如今不得妙無準和尚忌拈香含笑吟吟懷毒深深左搓芒繩生縛鬼子倒拈蝎尾殃害平人我雖蹉脚跨他門幸不遭他毒氣熏如何見得插香云只此為憑上堂古者道開方便門示真實相以拄杖劃一劃云方便門開也真實相在什麼處卓一下云數片白雲籠古寺一條綠水遶青山四月八上堂摩耶昔產一塊鐵無可名之名悉達擬鑄金軀鑄不成無端鑄成一大錯錯錯至今累我東土人年年轉洗轉埃塵上堂召大眾云祖師道汝學佛法如下種子我說法要譬彼天澤以是知種子所當有天澤不可無然而雨多則苗稼有傷言多則却道轉遠且如何得相應去揠苗助長非吾事塊雨條風不汝欺上堂舉教中道此事惟我能知又云惟佛與佛乃能知之又道如人飲水冷煖自知如是則諸佛出世祖師西來未免勞而無功雖然不因柳毅傳書信爭見龍王宮殿深解制上堂一結一切結一解一切解結解兩忘通身瀟洒絕瀟洒脫羅籠巨魚縱大壑一雁入高空謝秉拂上堂意句俱到不入深村入荒草意句不到瑚樹林日杲杲只如一言道盡意況不及時如何良久云到江吳地盡隔岸越山多宣首座至上堂捧鉢盂於南泉位上陷虎機深致臨濟於黃蘗面前為人心切如是眼目如是作用古今無間前後無差孤騖高飛趁落霞上堂召大眾云三玄三要五位君臣說偏說正分主分賓未免重添眼裡塵拈拄杖劃一劃云盡情劃斷空濶無垠孤鴻杳杳知何處門外蕭蕭落葉頻中秋道舊至上堂雅愛中秋月多情似故人在天何皎皎照我更頻頻圓影隨流水清光絕點塵孤高攀不及覿面最相親上堂九秋強半不寒不暖風細細雨霏霏水冷冷雲淡淡正當恁麼時還有西來祖意也無良久云一棹烟波蘆花兩岸佛成道上堂六年雪嶺幾番雪不是今番徹骨寒半夜三更禁不得無端北斗面南看瞿曇瞿曇開得眼來天大曉不知紅日已三竿上堂拈起拂子召大眾云這一捏子從上諸佛諸祖以至天下老和尚盡不柰何諸人還柰何得麼莫道諸人山僧也不柰何既不柰何畢竟如何良久云雪消知地暖雲靜見天高住袁州仰山太平興國禪寺語錄參學編師於咸淳元年五月十七日入院踞方丈云昔老維摩起模𦘕樣分明兩箇五尺剛然道有一丈諸人如不信後五日無事試來量看省劄祖師道如人在千尺井中不假寸繩如何出得自做艱難作什麼今日太傅平章公以幹旋造化之手向九仞重泉之下等閑拈出一箇藞藞苴苴不唧𠺕漢絲毫不犯致之雲端盡大地人只眨得眼且道據箇什麼良久云劄諸山江湖疏琢雪雕氷攢花簇錦鄰義昭昭友義烱烱扶人上樹推人下井劫石可消此恨難殞法座高不過尋尺廣不過尋尺舍利弗道吾不能升何乃甘自屈抑看看仰山今日平步去也陞座拈香祝聖罷問答不錄乃云據令四藤棒頭有眼明如日特書卍字碧眼胡僧笑揭天雖則雷厲風飛已是烏焉成馬所以道言語動用沒交涉非言語動用亦沒交涉纔擬恁麼便不恁麼斬新拈掇覿面提持袁州城裡春臺壁立平如砥集雲峯下古廟香爐口向天薰風南來凉生殿閣這裡領略得去不孤山僧五百餘里冒暑而來堪報不報之恩共助無為之化其或未然千峯朝華嶽萬派肅滄溟復舉乳源和尚示眾云西來的的意不易舉唱時有僧出源便打云是什麼時節汝出頭來便歸方丈師拈云布袋裡盛錐子不出頭是好手乳源怪者僧不知時節即且置乳源還知麼乳源不知即且置新仰山還知麼達磨當年無板齒只因強自出頭來當晚小參德山小參不答話高高峯頂立趙州小參却答話深深海底行二大老雖則力敵勢均未免徐六擔板一人於龍潭手內接得少許紙燭將作一條白棒佛來也打祖來也打向常武界上風高放火月黑殺人一人於南泉臥次度得幾句譫語裂轉舌頭曾到也道喫茶去不曾到也道喫茶去向幽燕那畔賣狗懸羊指鹿為馬使二老當初知有衲僧門下佛祖柰何不得底一著子必不作此去就殃害平人本欲盡情鞫勘貶向他方適以入院之初人事倥傯且與放過雖然且道仰山今夜小參畢竟是答話不答話良久云一朝權在手看取令行時復舉當山祖師一日有異僧乘空而至祖云近離何處僧云西天祖云幾時離彼僧云今早祖云何太遲生僧云遊山玩水祖云神通妙用則不無尊者佛法須還老僧僧云我來東土禮文殊却見小釋迦由是出貝多葉示之騰空而去師拈云明鏡當臺胡來胡現漢來漢現則故是因甚這僧當面塗糊集雲自有正令却與放過意在於何良久云千鈞之弩不為鼷鼠而發機中夏上堂六月中夏諸方放假大仰不然繩頭緊把常住百無一有不能掛懷只憂兄弟不會狗子無佛性話雖然常啼菩薩賣心肝風前狼籍誰人買上堂赤肉團上有一無位真人眼裡耳裏鼻裡口裡頻頻出入出入頻頻能言能喚能屈能伸能好能惡能喜能嗔諸人若也未曾證據便請證據集雲今日為汝保任其或未然無位真人是什麼乾屎橛無禪和尚至上堂寶劒出匣精金躍冶色澤星輝光𨦵斗射投之重津而光愈發越加之烈火而色無少假行為人間報不平定應索起遼天價上堂雁入高空蛩吟古砌劇談不二門單明第一義瞎却眼塞却耳聽得分明見得親不必龍華親授記中秋上堂召大眾云從上佛祖善巧方便千說萬說只說得光影邊事後代兒孫貪觀天上蹉過目前或掉棒打或水中捉轉沒交涉且道如何得相應去以拂子打圓相云此夜一輪滿清光何處無重九上堂談玄談妙將油洗皂行棒行喝剜肉成瘡諸方多是誇張作說集雲只據見定商量何故年年九日是重陽上堂風動心搖樹雲生性起塵只如雲未生風未動已前心性在什麼處諸人還知麼若也知得旋嵐偃嶽而常靜江河競注而不流野馬飄鼓而不動日月歷天而不周其或未然不覺日又夜爭教人少年上堂今朝臘月二十五明朝臘月二十六風前唱起仰山歌人皆道是雲門曲是則也是只是音韻有些不同如何見得良久云絲與竹不同肉歲旦上堂元正啟祚萬物咸新覓一毫舊相了不可得千年桃核裡元是舊時仁覓一毫新相了不可得新舊之相既不可得不可得亦不可得道泰時清萬國寧咸淳二年正月一眾僧入城赴溈山齋歸上堂召大眾云飛雪亭前宜春臺上物有萬殊春無兩樣住不顧去底猶欠劈面拳去不顧住底好與攔腮掌直饒去住兩忘如龍似象未免卸下衲衣連揮痛棒棒折也不放且道是罰是賞不見道為人須為徹殺人須見血上堂仰山上元令節笙歌且靠一壁雪晴山色挼藍凍解溪流瀨石滿眼看不盡滿耳聽不徹諸人若向這裡知歸不須更授然燈記別上堂召大眾云有祖以來談玄說妙斬新拈掇格外提持總是外邊打之遶徑截一句作麼生道良久云春風料峭凍殺年少佛涅槃上堂是夜雷雨佛滅二千有餘載五逆兒孫渾不採一夜雷轟雨霶霈諸天亦為之尀耐汝等諸人且莫錯怪元是這老漢在娑羅雙樹下震法雷擊法皷布慈雲兮洒甘露演說一路涅槃門涅槃門一路集雲與麼告報是真實邪虗妄耶不見道謂吾滅度非吾弟子謂吾不滅度亦非吾弟子上堂拈拄杖召大眾云你有拄杖子我與你拄杖子你無拄杖子我奪你拄杖子芭蕉老人雖則一期與奪可觀未免扶強不扶弱集雲則不然有亦不與無亦不奪自家拄杖自家提掇遂卓一下云應用臨機活鱍鱍靠拄杖下座上堂諸人分上各有一所清凉寶殿六門虗豁八窓玲瓏薰風拂拂來無時畏日炎炎曾不到泉流屋上四時雨鶴立松梢萬境閑汝等諸人還知也無若也知得各自歸家穩坐其或未然三條椽下七尺單前試將瓦子敲門看解制上堂結却布袋頭三世諸佛無出氣處放開斗門閘百萬魚龍有路轉身振𩮻擺尾搖乾蕩坤轟雷掣電鼓風雲雖然也須是照顧始得且道照顧箇什麼照顧向齋甕裡淹殺謝兩序上堂召大眾云天無私覆以三光地無私載以五嶽定國安以文武百辟匡徒領眾以東西兩班一或有虧萬有不就拈拄杖云只如拄杖子平日撑天拄地支險扶危還假他力也無卓一下靠杖伸手云拈起放下也少這箇不得上堂八月秋何處熱稻花吹香踈林減葉三點五點不時雨一聲兩聲何處笛若向這裡聞無有聞證入圓通斯為第一中秋上堂吾心似秋月秋月似吾心雙照纖塵淨俱清萬籟沉十分明又白一樣古猶今不是寒山子何人解此吟上堂九月授衣無衣可受衲僧門下別有要妙如何見得不見道新糊紙被烘來煖一覺和衣到五更聞得上方鐘皷動又添一日在浮生上堂召大眾云百尺竿頭進得一步上無攀仰下絕己躬萬煅爐中煉得十成撲之不破擊之不碎雖然更須知有向上三昧何故萍蕪盡處是青山行人更在青山外重九上堂秋雨乍晴秋天如洗九日菊花新千林黃葉墜人人只知驟步登高往往蹉過自家穩密田地莫有不蹉過底麼良久云切忌切忌上堂召大眾云萬法本無一心何有絕慮忘緣默默自守儻能朝於斯夕於斯自然虗而靈空而妙正當恁麼時遂伸手云我手何似佛手上堂集雲不會禪不會道橫畫不識竪畫不曉日裡三餐夜後一覺年來老且病轉見不唧𠺕裙子褊衫箇也無袈裟形相些些有遂提起袈裟云見麼要底將取去其或未然莫怪老僧好謝四頭首秉拂上堂召大眾云四葉紅蓮一音宣演其語巧妙其義深遠前印威音一點不差後證彌勒不差一點離四句絕百非即不無只如一人恁麼一人不恁麼一人恁麼中不恁麼一人不恁麼中却恁麼又且如何良久云造作不同一般米蟠龍鑑首座至上堂衲僧家無本據鑑在機先妙在轉處問漚堂上半座平分集雲峯前孤風絕侶看看九萬搏扶搖垂天之翅摩雲霄入城歸上堂初二出城歸來初五十字街頭撞見張三元是山前舊時李四面目如前語言如故再三道佛法澆漓眾生難度不必按牛頭喫草不用將針合成斧何故甜瓜徹蔕甜苦瓠連根苦上堂二月初五群花競吐或逞夭紅或誇雅素月下精神風前態度明明祖意無回互堪悲堪咲老靈雲錯認桃花作眼睛至今猶自不惺惺上堂召大眾云薰風南來凉生殿閣諸佛出身處昭昭在心目當機覿面回避無門只要諸人披襟領略其或未然開眼也著合眼也著上堂一月復一月此月又過五兩輪日月何奔忙百年彈指如虗度物不遷還知否不是佛亦非祖且道畢竟是箇什麼良久云流水不腐戶樞不蠹謝兩班并秉拂上堂入理深談語非語默非默量材補職武是武文是文用舍臨時剸裁在我只如將丈六金身作一莖草用將一莖草作丈六金身用又作麼生良久云寰中天子勑塞外將軍令中秋上堂我心似秋月道似又還別秋月有虧盈吾心無損益人人只知登樓賞翫向天邊覓殊不知自己衣單下有箇光明藏子十分圓滿十分皎潔信得及見得徹非惟一夕歡千古可怡悅上堂不思善不思惡孤逈逈活鱍鱍不用追尋不勞捉摸只貴諸人知著落知著落楊岐驢子三隻脚上堂召大眾云楊岐栗棘蓬吞著礙喉嚨東山鐵餕餡渾崙苦磝磝諸人若要省力不如參一箇平實且道是那箇平實不見道楚王渡江得萍實大如斗赤如日剖而食之甜如蜜上堂若論此事諸人分上本自具足初無欠少三世諸佛競出頭來不過指似得你歷代祖師天下老和尚互相提唱不過說向得你集雲今日鼓兩片皮不過勸勉得你何故不見道舜何人也予何人也有為者亦若是住福州雪峯崇聖禪寺語錄參學編師於咸淳五年三月二十一日入院據室南山一條鼈鼻蛇多少人向這裏弄死了也拈拄杖云今日拈來活弄將去擲丈云汝等諸人各須照顧陞座祝聖罷乃云法無定相時止則止時行則行遇緣即宗在秦為秦在楚為楚放下仰山鍬子輥起雪峯木毬雷動七閩風行百越俾未見者見未聞者聞聞見歷然是箇什麼這裏領略得去開山祖師在你脚底鰲山未到成道多時象骨未登說法久矣然雖如是今日開堂又作麼生竪拂子云只將這箇真消息仰祝吾皇壽萬年復舉開山祖師問僧甚處來僧云江西祖師云江西與此間相去多少僧云不遙祖師竪起拂子云還隔這箇麼僧云若隔這箇即遙也祖師便打師拈云問處分明答處端的且道江西與此間畢竟相去多少若少若也知得便新雪峯去楚來閩不移寸步其或未然竪拂子云何止隔這箇當晚小參盡大地是自己水是水山是山會四海為一家胡自胡漢自漢於其中間覓一毫爾我之相了不可得覓一毫內外之相亦不可得既無爾我又無內外通上徹下是箇大解脫門如千鏡圍繞無你回互處如十日並照無你遮掩處只要箇上無攀仰下絕己躬寸絲不挂底荷負得去便見千五百人善知識面目見在其或未然任從滄海變終不為君通復舉開山祖師一日參次有僧出珍重便去祖師云總似這箇師僧省我多少氣力玄沙云和尚恁麼接人瞎却閩中一城人眼去在祖師云汝又作麼生玄沙云好與三十棒祖師云已後無人柰汝何師拈云古今盡道玄沙有超師之作殊不知被祖師好好掘箇坑子深深埋了直至而今出不得具眼者辨取上堂人人頭頂天脚踏地眼裏放光鼻孔出氣與他諸佛諸祖無別無異因甚握節當𮌎聽我謾你莫有不被謾麼我且問你雞寒上樹鴨寒下水畢竟是祖意是教意真覺祖師忌日上堂昔日不生今日不滅出入飛鳶嶺未曾有出入洞山不曾到投子不相識若道嗣德山未免自屈抑且道今日設忌還來應供也無良久云象骨巍巍摩碧空寒泉皎皎浸明月中秋上堂節屆中秋凉飈四起萬里無雲一天如洗明皎皎月上孤峯香拂拂桂飄庭際以拂子擊床云會麼以我為隱乎吾無隱乎爾無準和尚忌日拈香三十年前無交涉處有交涉三十年後有交涉處無交涉須無交涉飲恨難忘含悲含笑一爐香結夏上堂二千年前冬寒夏熱二千年後夏熱冬寒雪峯今日安居不過只要諸人順時保愛而已若是踞菩薩乘修寂滅行他家自有座主在諸人切不得錯恠老僧何故卓丈云主丈生根休用剪鉢盂無柄不勞安城歸兼謝辨藏主上堂綠水青山紅塵閙市一大藏教滿眼滿耳這裏有人揀辨得出入則箇箇歸元出則無無不是雖然只如馬祖震威一喝百丈三日耳聾又作麼生良久云破草鞋見水正旦上堂辛未元正有則語大地無人知落處屋角山禽破曉啼為人一一從頭舉且道說箇什麼歲旦無風甲子不雨中秋城歸上堂自夏及秋頻頻出入送舊迎新奔馳不歇十字街頭忽喫攧起來拾得胡餅隻今日不辭舉似諸人以拂子打圓相云見麼團團圓圓皎皎潔潔十成脫似中秋月上堂一年十二月是臈月年尾臈月三十日過了三之二雪峯晝裏夜裏波波挈挈手不釋杓脚不離地理會甚底忽然被人道千五百人善知識因甚也脚忙手亂又且如何支遣良久云老僧住持事繁上堂一葉落天下秋殊不知象骨峯頂一葉未落已前秋已到多時了也如何見得良久云六月山房冷似氷上堂祖師道望州亭與你相見了也烏石嶺與你相見了也僧堂前與你相見了也祖師與麼與人相見猶隔海在何故盡大地撮來如粟米粒大望州亭烏石嶺僧堂前甚處得來老僧未出瞿塘關已與諸人相見了也莫有信得及底麼良久云萬古長空一朝風月上堂衲僧行處孤風凜然動無妄動言無妄言如履薄氷如臨深淵不須明祖意只此是單傳上堂大作業人安禪入定大修行人披枷帶鎖恁麼會得清淨行者不入涅槃破戒比丘不入地獄好與一狀領過雖然如是莫將閑學解埋沒祖師心上堂節屆中秋風清月朗盡大地人爭先賞翫賞翫即不無我且問你月來眼裏眼往月邊有人道得許你廣寒宮裏高折桂枝其或未然莫辭終夕看動是隔年期退院上堂召大眾云馬師一喝大雄峯直得三日双耳聾今日松山聾更甚半年不復聞鼓鍾依俙鈍鐵彷彿頑銅只好投之火聚中火餘炟爀地通紅幾多錯認鳥啼月落煜煜曉星明向東住慶元府太白名山天童景德禪寺語錄參學編師於咸淳九年三月十一日入院指三門天門一合十方無路似海之深如山之固且道如何造入良久云步佛殿舉香云謂這箇不是佛謗沉無香謂這箇是佛增金以黃二俱拈却一倒一起築著磕著方丈這裏是普請盡大地人成佛底去處牙如劒樹口似血盆未敢相許只如嫌佛不做底到來時如何良久云三十棒且待別時勑黃天人群生類舉起云皆承此恩力且如何是此恩力寰中天子勑府疏一畫未形三墳已且恁麼見得光焰何啻萬丈長其或未然言外領取山門諸山江湖疏函盖乾坤句隨波逐浪句截斷眾流句三句盡在此不多一字不少一字眾眼難瞞分明舉似法座向上一路只在脚底切恐諸人尚未知且行一轉似與你遂驟步登座拈香此一瓣香芽孽於混沌未分之際歷世滋多馥郁於乾坤既定之餘騰芳愈久爇向爐中恭為今上皇帝祝延聖躬萬歲萬歲萬萬歲陛下恭願一人有慶致四海於昇平萬壽無疆同兩儀而永久次拈香一瓣奉為太傅平章魏國公大丞相樞使國公簽書相公伏願作股肱耳目與天齊休為舟檝棟梁同心共濟次拈香云此一辨香九回拈出四海共知奉為前住徑山先師佛鑑圓照無準禪師大和尚非圖報德酬恩且要熏天炙地遂趺座問答不錄乃云飛鸞渡口細柳含烟宿鷺池邊長松蔽日大光明藏不離當處覺城東際只在目前溪山各異雖則二十里之遙雲月是同灼然無一毫之隔所以道心同虗空界示等虗空法證得虗空時無是無非法既無是法又無非法且聽主丈子逞神通去也拈主丈卓一下云𣤩瞎正法眼畫一畫云畫斷破砂盆俾今日一會聞者見者脫離聞見獲大總持透過威音那邊復見古道顏色民康物阜海晏河清萬姓樂堯仁八方歌舜化正恁麼時如何靠主丈蒲團靜倚無餘事永日寥寥謝太平復舉僧問投子和尚如何是一大事因緣投子云尹司空與老僧開堂師拈云投子古佛如大富長者踞庫藏中信手拈來無非明珠大貝惜乎撞著這僧寧免暗投今日或有人問如何是一大事因緣只向他道老僧四十年前曾到此間來當晚小參昔年曾到危樓傑閣摐然今日重來啼鳥野花猶識山中故人知我至爭來問訊今何似獨有隰州老人蹙頞而言曰法逍下衰無甚今日佛佛要機無人採著祖祖機要誰解論量所謂水清徹底魚行遲遲空闊莫涯鳥飛杳杳底消息蔑聞也既荷遠來毋忘悲願重新拈掇啟迪後來此外無禱因謂之曰茲承告誡敢不遵從第新來乍到未知廚竈廚竈尚未知況廚竈外事雖然這裏莫有佛佛要機祖祖機要盡情颺下渾不採著底麼却許他是箇衲僧出來掀倒禪床呵叱古佛未為分外其或未然休將傳說為傳說莫把曾參作魯參復舉寶公令人傳語思大何不下山教化眾生一向目視雲霄作麼思大云三世諸佛被我一口吞盡何處更有眾生可度師拈云鍾山南嶽以手指口云總被這箇礙一人開了合不得一人吞了吐不得直至如今柰何不得天童還柰何得麼良久云早知今日事悔不慎當初留兩序併謝諸山上堂舊時日月舊日山川東西不易南北不遷水雲雜沓龍象駢闐古佛家風尚儼然如何見得良久云雨過千林開翠幄月臨雙沼浸銀蟾無準和尚忌日拈香舉香云咄這老漢不堪共語寬而不廓纖粟詎能容質而不文麤拳為正句我昔錯擔脚跨門至今有恨無雪處有雪處麤茗一杯臭煙一炷結制上堂拈拄杖召大眾云法性土中幸自太平無事二千年前剛被黃面老漢忘起兵端直至如今年年團結防拓未已天童雖則老不以筋力為能未免拈起無柄鐵苕菷掃蕩煙塵俾復見劫初無事之日卓丈一下云且喜太平訪諸山歸上堂召大眾云走盡四天下只在一塵中不離一塵中周遍四天下不是神通亦非力假有人知得著落許你入妙喜世界是不動如來其或未然一任鑽龜打瓦上堂召大眾云休去歇去玲瓏巖上落花雨消焉息焉路入清關別有天塵不到暑不到行亦禪坐亦禪高蹈威音未朕前正恁麼時如何喫粥喫飯過聽風聽雨眠上堂諸莊荒旱吾總不憂只憂兄弟不會狗子無佛性話東山演祖恁麼道若以事上看老婆心切即不無若以理上看屈抑諸人也不少何故舜何人也予何人也有為者亦若是回祿後上堂鼓報四更地搖六震火焰為三世諸佛說法三世諸佛立地聽聽則不無且道說箇什麼虗空有盡大道無窮窮則變變則通卓丈一下云信手拈將莖草插瓊樓玉殿凌蒼穹元宵上堂兼謝新都寺召大眾云排難解紛還他敏手回生起死須是其人既得其人可以定禍亂可以致太平復三代禮樂於今朝開萬解金蓮於此日元宵共慶良夜同歡雖然猶是尋常遊戲邊事極則一句又作麼生疾風知勁草版蕩識誠臣上堂召大眾云仲春漸暖是處花開夭桃烘日暈生臉紅杏吟風笑滿腮是今彌勒是古如來一一分身不用猜有人一見便見敢保老兄未徹何故即色即聲求不可離聲離色覓猶乖蘇湖行化歸上堂去時元只空双手歸日依前双手空底事兩肩擔不起打開畐塞滿玲瓏且道是箇什麼良久云姑蘇明月苕霅清風上堂召大眾云泯志灰心參禪學道無煩惱中自討煩惱何不向老胡未來已前試著眼看自己分上有何欠少天童恁麼道不入深村入荒草畢竟何如不許夜行投明須到佛涅槃上堂謂吾滅度未免落斷見謂吾不滅度未免落常見二見俱遣除十方佛皆現且道釋迦老子是滅度耶不滅度耶莫有辨明得底麼良久云桃花著雨洗紅粧揚柳舞風拖綠線前瑞巖希叟和尚至上堂斗粟可舂尺布可縫情深義重山包海容載笑載言喜而欲舞何故豈無他人不如我同父上堂菩提離言說從來無得人所以世尊道我於燃燈佛所若有一法可得則燃燈佛不與我授記既是無一法可得用授記作什麼若不授記爭知無一法可得恁麼看來以言說求菩提固不可離言說求菩提亦不可畢竟如何渡河須用筏到岸不須船復云夏令更新春歸奏勳秧田鋪翠麥隴翻雲日猶舒暖風已來熏目擊道存如不委更饒一喝主賓分乃喝一喝云且道是主是賓謝化士歸上堂召大眾云見可而進知難而退未出常流戰無不勝攻無不取方為好手烟塵眯目白刃滿前赤手空拳奮身不顧所過者化所存者神所嬰者摧所歒者破休征罷戰奏凱献俘一句作麼生道壓殺兩肩擔不起滿船和月載將歸上堂秋風清秋月白秋水共長天一色不是心外境亦非目前法可中一見便知歸平步廣寒攀桂枝上堂海山雨歇水國雲藏薰風南來殿閣生凉佛出身處昭然孔彰堪笑當年奚老子無端好肉上剜瘡宏智祖師忌拈香偏中正正中偏正偏不及處別是一壺天水澄澄風細細雲澹澹月娟娟金針兮纖纖玉線兮綿綿以此續洞脉於既微以此大丹霞之正傳作興太白特遊戲之餘焉今不在後昔不在前光明藏中初無間然一盃麤茗一爐煙天寧覺庵和尚至上堂拈主丈召大眾云故人義重訪我巖扉鳥啼花笑雲淡風微莫恠坐來卓主丈三下頻勸酒自從別後見君稀上堂十五日已前棒如雨點十五日已後喝似雷奔正當十五日棒也不拈喝也架閣諸人向甚處見天童歷歷分相珠在盤剔起眉毛還蹉過一切希叟和尚兩訃音至上堂召大眾云去秋双峩摧今夏芝巖墜松江松慘然花嶼花流涕惟有長空孤月圓東西分照兩無偏元宵上堂召大眾云天童今日著堅固鎧奮不顧身卓丈云將德山棒掃除四境魔軍貴圖安靖以臨濟喝叱退三邊強𡨥遄至清平然後打禾山皷奏凱回戈歸馬於華山之陽放牛於桃林之野作金牛舞唱太平歌風以時雨以時五糓熟民人育且道是神通妙用法爾如然良久云我見燈明佛本光瑞如此淨慈東叟和尚遺書至上堂拈辭世頌南山末後句未舉先分付生也何曾生死也何曾死生本不有死亦無空湖光晴㶑灩山色雨濛瀧中秋上堂并謝離相西堂一月在天影含眾水且道有相可離無相可離若道有相可離月以何為相若道無相可離爭柰一月在天影含眾水諸人還知麼萬古碧潭空界月再三撈摝始應知
