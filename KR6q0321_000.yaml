front:
  text: 夫子曰豫欲無言又曰天何言哉故大上無言其次立言言所以載道不以言求道而以心會道抑末矣夫非想藥法皆空釋氏之教也環溪以其學於夫子者逸而云墨蓋將晦其光泯其用而求其所謂寂滅云者所至一話一言其徒記而録之既彚而成編則請余為之序猶記環溪在黃龍日每訪余山中率靜坐寡言其後日邊再會蕳默過於前時知其非以口耳為學者又非挾所有以衒於世者然則環溪之有語録贅矣而余復序之抑又贅矣後欲識環溪者當以環溪求環溪毋徒以語録求環溪云歲在癸未浴佛日抗山寓叟章鑑書于所寓之溪堂環溪和尚語録目録卷上初住建寧府瑞嚴禪寺語録臨江軍瑞篁山惠力禪寺語録隆興府泐潭山寶峰禪寺語録隆興府黃龍山崇恩禪寺語録建昌軍資聖禪寺語録瑞州黃檗山報恩光孝禪寺語録袁州仰山太平興國禪寺語録福州雪峰崇聖禪寺語録慶元府太白名山天童景德禪寺語録卷下小參拈古頌古普說法語佛祖讚偈頌題跋小佛事自讚行狀跋
