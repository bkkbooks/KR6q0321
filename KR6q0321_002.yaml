一無位真人常在汝等面門出入是也名雖異體則同說雖別意不別也所謂六合同出自者眼與色合耳與聲合鼻與香合舌與味合身與觸合意與緣合教中道元是一精明分成六和合是也若能知本原佛亦不相似殊不知知了本原蘊在𮌎次正是大病要得快活須是忘却此知可也此六根門雖與六塵合然造道之士舍此無由而入所以靈雲遍參三十餘年一日忽見桃花便道自從一見桃花後直至如今更不疑香嚴久居南陽菴因除瓦礫擊竹作聲當下省發乃云一擊忘所知更不假修持百丈被馬祖扭鼻頭忍痛失聲因而瞥地看得從上佛祖以來入道蹊徑非但六根如楞嚴會上五五開士或從六根而入或從六塵而入或從六識而入及乎所證無二圓通諸人逐日坐臥經行總在裏許剗地蹉過往往握節當𮌎却向曲彔床上老禿口頭取辦是則名為可憐憫者雖然見聞覺知是道道離見聞覺知若守住見聞覺知不肯放捨所謂見聞不脫如水中月不見百丈侍馬祖行次見野鴨子飛過祖云是什麼丈云野鴨子祖云什麼處去也丈云飛過去也祖遂扭百丈鼻頭丈作忍痛聲祖云何曾飛去丈因而有省次日祖升堂丈出來卷席百丈貧兒乍富氣宇如王殊不知腳跟下紅線未斷在後來再參侍立次祖以目視禪床角拂子丈云即此用離此用祖云你向後開兩片皮將何為人丈取拂子竪起祖云即此用離此用丈挂拂子於舊處祖震威一喝百丈直得三日耳聾噫百丈若無這末後一解未免一生只在聞見裏著到安有獨坐大雄峯底消息尋常室中每見兄弟來下咄下喝竪指擎拳或撫掌或點頭或提起坐具做盡伎倆老僧未免向化道不是多是不意而去噁兄弟老僧向你道是未必是向你道不是未一不是若自家手中握底果是一塊真金管人道是與不是作什麼昔有一僧到章敬繞禪床三匝振錫一下敬云是是又到南泉處依前如是泉云不是不是此是風力所轉終成敗壞僧云章敬道是和尚為什麼道不是泉云章敬即是是汝不是蓋緣這僧病在見聞覺知處被南泉輕輕點破更去不得初非南泉強移換他自是他未到脫離見聞之地所以道百尺竿頭立底人雖然得入未為真百尺竿頭須進步十方世界露全身這裏莫有百尺竿頭能進步底麼若有遇桂牌日來吐露看法語示淨明月長老百丈已前無住持事刀耕火種隱遁過時學者聞其風而師之主伴相依力究己事捍勞忍苦不易初心願力既堅大法明悟深藏密護不忍輕售一朝為人所迫踞曲彔床自然光明盛大照映千古所謂根本固則枝葉茂也去古既遠人根益浮才與僧倫便作住院之想一旦為人所誤打自大鼓任情肆意撥無因果及乎緣謝其為則闕有不可勝言者蓋由初心不根於道名利所牽差之毫釐謬以千里也長老早歲出家早歲行腳叢林去處亦已遍歷時節既至操住山斧固非分外然院無大小弘之在人儻以從上佛祖為標格切切行持雖對聖僧喫飯亦無愧矣何患檀信不歸美聲名不馨香龍天不加被四恩不畢報夫如是稱曰長老豈徒然哉佛祖三經寄去每日得暇披玩一遍依而行之轉以授人庶不忝為黃面老子兒孫也至祝至祝示果侍者道在日用常行之間然即日用常行以為道固不可離日用常行以為道亦不可視聽言動飲食起居無一或妄無一或非不為氣所便不為境所奪不以廣聞博見為己解不以奇言妙語當本參似兀如癡只守間間地如鴈過長空影沉寒水鴈無遺蹤之意水無沉影之心視昔趙州文遠鬪劣不鬪勝似金博金國師耽源三呼三應如水與水直饒恁麼更須知有衲僧門下佛祖奈何不得底一著然後入魔入佛無可不可逆行順行等皆方便雖然也須是一回汗出始得若果得一回汗出白雲所謂一莖草上現玉殿瓊樓豈虗語哉果侍者兩地相從恰半十載燒香問訊了無錯謬更能向上加鞭不惟拍肩文遠耽源高出一頭地乃善臨別需語為日用警因其請而告之示龍維那祖師西來教外別傳不立文字單提獨掇不過只要人去却𮌎中物喪盡日前機知得自己一段光明亘古亘今照天照地處聖不增居凡不減不以夜而晦不以晝而明十日難視千手難掩即此謂禪非禪也即此謂道非道也離此別求大似去河覓水捨燈求火也所以迦文老漢雪嶺六年才見明星之後便云一切衆生具有如來智慧德相但以妄想執著而不能證得子細看來即今高打行纏挑包行腳妄想也江上江南尋師訪道妄想也終日面壁坐破蒲團妄想也朝參暮請廢寢忘餐妄想也總不恁麼須是個猛烈底漢才聞舉著如鷹搦兔似鶻拿鳩披襟承當赤手荷負未為分外然雖如是切忌坐在這裏更須知有轉身底時節始得所以道百尺竿頭立底人雖然得入未為真百尺竿頭須進步十方世界露全身且道百尺竿頭如何進步豈不見興化和尚一日謂克賓維那曰汝不久為唱道之師賓曰某甲不入這保社興化云會了不入不會不入賓曰總不恁麼興化便打乃云克賓維那法戰不勝罰錢五貫設饡飯一堂至明日興化白槌云克賓維那不得喫飯即便出院只如興化恁麼意在於何為人須為徹殺人須見血克賓恁麼又作麼生路遙知馬力歲久見人心雖然百尺竿頭二俱進步未得在示宗侍者我宗無語句亦無一法與人德山老漢恁麼道已是狼藉不少既無語句一法亦無畢竟以何為我宗若非吹滅紙燭處喪盡鬼家活計安能赤手空拳別立生涯一條白棒佛來也打祖來也打以至拆佛殿遣羅漢見處諦當用處軒豁如疾雷迅風破山震海無你近傍處無你睥睨處豈近世央庠淺根之士可得而倣佛耶傅云希顏之人亦顏之徒歟若是俊流壁立萬仞一日千里得失不顧危亡不知寬作程限急著腳手期於徹證到佛祖不到之地見佛祖未見之處特立獨行孤風凜凜如獅子出窟踞地哮吼群狐屏跡假使周金剛再世亦當讓雄也切宜勉旃佛祖讚出山相天將有大任于厥躬必先苦其心志勞其筋骨餓其體膚不然爭得二千有餘載百億四天下仰之如日星愛之逾父母乎觀音耳門圓照日月兩間悲願洪深衣被四海方便智慧靡不圓融見聞覺知無能障礙人間天上獨優游是則名為觀自在馬郎婦雲開天竺月照金沙心心妙法念念蓮華未必將身許馬家魚籃鱍喇籃中活錦鱗風前提起不辭頻幾回繞盡長沙市賣與買人無買人文殊或草為衣或獅為輿千變萬化無二文殊雖然覓則不可得五臺山色猶如如布袋逢人乞一文袋裏敵國富不是下生遲嫌佛不肯做達磨西來十萬里北渡一莖蘆剛道來傳法還曾傳得無維摩凜然夷齊之風翛然巢許之態橫作竺乾之孽崛起釋門之害口吧吧地說盡萬千究竟不知有這一解人皆謂金粟如來示現毗耶我只道病多諳藥性底耆年婆羅門者也黃蘗斷際禪師大機磅礴大用縱橫要掌便掌大中天子掌中突出要棒便棒濟北大樹棒頭挺生大唐國裏只一人千古仰之日月明裴相國咄這措大極是叵耐操我戈矛入我疆界撲滅圓覺大光明藏瀝乾圭峯無邊義海所至皆望風退衄末後遭蘗山和贓捉敗納款投降願為弟子奉事無懈雪峯真覺祖師弄出鱉鼻蛇彈起廣陵曲清韻難可掩毒氣不可觸瞻之不足聽不足千古萬古福城福朝陽穿破衲一條屈曲無絲線半寸攣拳穴鼻針補得完全成一片舉頭紅日到天心對月了殘經古教只知遮老眼銀蟾不覺上孤峯看來看到無看處光境俱忘一卷終偈頌廛中佛事幾回走巷復穿衢貨賣南方鎮海珠一栲栳都傾出了不知酬價有人無物外生涯三十餘年海上遊未曾容易下金鈎等間拋擲絲綸處蝦蟹魚龍一網收松風度曲大夫噫氣撼青冥餘韻蕭騷入戶庭遞到高山流水意不知誰解眼中聽荷露跳珠優曇初現葉團團錯落明璣走碧盤沆瀣莫將魚目比看時容易覓時難定翁日用千差萬別中如如不動等虗空春妍秋靖幾更變此老何曾改舊容古堂過去威音佛已前向虗空裏架榱椽至今景定年之二往却門風尚儼然鏡空團團荷葉不相似豁豁大虗難比倫箇裏洞然無一物擬於何處拂埃塵野航遠泛飄然一葦輕水天上下鏡無塵自從碧眼胡歸後著腳那知是甚人月浦孤明歷歷曲彎彎色與蘆花倣佛間多是滿船空載去幾人親得見珠還危峯似側如欹杳靄間氷稜劒刃不多爭可中不是通玄頂切莫粗心向上行懶牛鼻繩拽脫了無拘慵有餘兮頑有餘芳草滿前渾不顧眠雲臥月只如如南窗百一十城煙水外玲瓏八面自天開等間坐斷東西北無限薰風拂拂來虗舟內亦空兮外亦空不施櫓棹不張蓬聽它東去又西去誰管漫天鼓黑風坦翁山未為高水未深賤非泥土貴非金自來一種平懷看到老何曾有二心可山三拜起來依位立孤高不與衆峯齊自從得髓歸來後便見乾坤宇宙低寄雪竇希叟舌本瀾翻千丈雪眼青錦鏡一壺氷瞎驢種草有如此滅却凌霄正續燈寄天寧雪庭一本凌霄秋後瓜遲遲九月裏開花霜前結子須彌大壓倒東西浙五家看石田語語言硬淨如生鐵眼目高明爍太陽今日江湖無此作令人三嘆憶平羌送僧遊南嶽一口盡吞三世佛近來出世佛猶多為吾問訊老思大底事不能開口何吉州圓上人之浙廬陵米價沒誵訛半說低兮半說高此話要圓緘却口聽他江浙閙嘈嘈瓊上人之杭懷抱瓊瑤一段奇通身富貴少人知四藤擊碎還收拾攤向皇都賣與誰風幡亮上人游浙動在風幡動在心集雲棒下已分明而今百越三吳去肯聽它家熱碗鳴月華嵩上人之杭月華如水夜沉沉一曲簫韻韻更清曲罷莫言無覓處西湖後夜轉堪聽傳上人之吳達磨西來有底傳賺人掘地覓青天況今楓落吳江冷去去休容易泊船暫到騎鯨捉月莫辭勞海角天涯打一遭後夜再三撈摝得碧天雲靜一輪高送曇知客歸感山懶向人前送又迎飄然去路一身輕到家有問到家句雨過瀟湘秋月明刀鑷黃陳二生手持刀鑷謁桑門叉手擎拳笑語溫且說工夫精妙處斷然毫髮不容存雙手乖如雙眼乖等間淨出頂門埃幾多鐵額銅頭漢總被渠儂按過來禮疏山塔二造塔當年事喧傳直至今示人千古意與匠兩三金不得羅山語誰知矮叔心瓣香來作禮肯顧白雲深江橫一練平山色四時青水足柴猶富人多爨不停無絃猶自韻有耳幾曾聽槁矣齊簷柏頻看涕忽零送孚藏主歸江西雲臥𮌎中蟠萬卷舌端筆端皆具眼評今論古知幾何寥寥百年骨不冷有孫挺特尤掀騰富有蘊藉如弗能韜光鏟彩事枯硬不學乃翁牽葛藤壁立萬仞出一語佛祖應無啓口處有時一默淵且深盡大地人難指注腳尖踢倒凌霄峯揮劒活屠潭底龍三條椽下四世界破蒲團邊兜率宮秋風忽起故山興歸本無歸語何剩江湖斫額應望君莫作稱鎚落深井將赴雪峯示圭上人上人辭我去行腳我亦早晚行腳去天涯海角或重逢鉢飯莖虀又相聚自笑年登六十七眼昏耳瞶腳無力觸事無能只面墻百千追悔有何益少壯學道宜加鞭危亡不顧勇直前如一人與萬人敵破堅挫鋭成萬全放牛歸馬群務息好是太平無事日塞北歸鴻截霧飛江南野水連天碧見侍者乞語為入道蹊徑入道蹊徑無蹊徑日用現行何不省和南問訊已乖張應對賓朋曾不隱同盂共飯況三年話破那知萬萬千今日炷香重覓語許時聚首成徒然老僧更不能忉怛痛掌寧辭當面搭從教負痛走出門呼天怨罵齒沒舌禿口未合題跋跋妙喜與管盈叔居士頌管公盈叔居蘿湖幸自不為藤蘿纏倒無端誤入花木瓜林惹得通身荊棘江湖敏手不能為之善解從而加以爛葛為蔓滋甚豫恐秀亦墮此頴脫無繇故揮以金剛王寶劒云跋古巖送徽妙峯歸南嶽偈昔老妙峯佩南堂正印虎視諸方而所居之剎枯茅敗屋僅庇風雨人不堪其憂而師獨安之三十年不改其樂豫嘗升其堂每以人境不侔為恨今觀古巖贈其歸衡嶽之語雖靈山授記不是過矣吁為龍維那跋高原和尚煆髮頌珠回玉轉錯落金盤高原和尚示人之舍利也龍維那既能寶之幸毋以豌豆魚目混之乃善跋癡絶與嗣子明老法語并書明曾做維那養子不須教落賺自然會纍紙沓幅之語何婆嬭如是耶當時興化打克賓底主杖幸自不在別人手裏因甚放過儻能盡令而行則玉山今日未到如此茲因郁禪人持來乞語炷香展觀殊為老叔惜跋中洲鄭居士佛牙舍利頌軸佛牙舍利世所希有中洲藏之甚祕皖翁訏露向人雪峯一衆讚之罵之無非五綵𦘕虗空也讚罵不及處却請居士道為見侍者跋無準癡絶書昔遊鐘阜凌霄之門見其提唱呵叱佛祖不啻塵垢粃糠今觀與南屏書敬之愛之雖祥麟瑞鳳不是過但不知敬愛與呵叱孰是見既寶此當持以求頂門具眼者訂之庶見二大老用處逈出常情不然鼠聚乾薑何益哉跋佛鑑佛海法語後豫父兄平昔多病頗諳藥性所說方子雖各不同點撿將來皆經驗者若依此修合必無謬誤若不依此修合亦無謬誤何故才形紙筆已非妙訣也韓子謂火其書豫於此軸亦云題谷源不無軒朱文公墨跡後丁巳之夏庚暑正隆齊餘靜坐粟中世界有大比丘名曰舟者合掌而前曰吾祖雲谷與晦菴朱文公為方外交文公扁其軒曰不無閲歲滋久厥義未聞願為宣說豫曰坐吾語汝豫非義學者不無之義又安能說且以子舉此意為此來扣我門入我室伸此問謂非不無可乎子十二時中折旋俯仰嬉笑怒罵語默動靜應對進退謂非不無可乎三八五日升堂入室鞠躬叉手摳衣趨隅目覩耳聞心開意解謂非不無可乎文公未書爾祖未揭不無之名已不可得而掩矣子亦未舉豫亦未答不無之義已粲然在前矣逮乎書而後揭揭而後請請而後說不無為無無為不無紛然是非殆將不可得而辨欲求所謂不無豫未敢保任候阿逸多出世請往彼問舟蹶然而起再拜曰不無之義得之矣乞書以為證於是乎書題佛照諸老墨跡後雨霽初秋風清萬壑響舂巖溜香噴水沉政爾橫刀而眠有客扣門呼童視之乃南浦元藏主也稽首作禮出示巨軸與炷展觀恍然如揖拙菴父子兄弟覺範補之諸大老於座間喜不覺舞因謂之曰一軸之作字字句句曲盡世出世間之妙非今時藻繪語也不知緊切為人處子知之乎元良久曰直截根源腳踏實地無踰此矣若夫斂容默照湛寂無依探淺深輕去就不過持身䇿也豫曰然但其間俗漢子道荒山藏古寺見旁水梅開一枝三四豫竊怪焉子以為如何元笑曰將謂是個俗漢既知如是併宜寶之題群牧圖雨過桃林草正肥休征牧放恰相宜擎頭戴角群然樂喜見太平無事時題草蟲圖長莖短莖芳草翠東個西個秋蟲寒平白祖翁田一片時人莫作𦘕圖看小佛事倫首座秉炬六十八年北山之北南山前風清月白南北絲毫元不隔霹靂一聲喪盡生涯無一星崖崩石裂螺江江水連天碧這箇是月巖首座末後句子山僧從而注破還得相應也無其或未然重繫以詞以火炬打圓相云見麼劫火洞然毫末盡巖前依舊月輪孤月上座秉炬見月休觀指猶有月在歸家罷問程猶有家在只如鳥啼月落家破人亡時如何通身是火通身水烈焰堆中鼓怒濤則上座秉炬元宵見成有則舊公案抵死拈來翻覆看啐地折兮嚗地斷上元定是正月半因行掉臂誤入長安燈火燒空奪夜寒真上座入塔皮膚脫盡真實獨存如珠似玉輝乾輝坤大地不可得而藏無常不可得而吞落在雪峯手裏且道如何折合一分奉釋迦牟尼佛一分奉多寶佛塔廣維那秉炬以火炬打圓相云祇這箇還會麼廣大配天地光明逾日月佛眼覷不破佛手遮不得一槌百雜碎何處尋蹤跡擲下火炬云石火光中明善上座秉炬以火炬打圓相云某人還會麼只這便是不思善不思惡父母未生已前本來面目便恁麼領略得去如睡夢覺如蓮花開如病得汗如死得活一得永得更無退轉雖然如是擬議不來火蛇燒面佳上座秉炬脫屣仕途致身林下橫草不拈竪草不把去來自在生死優游烈焰堆中輥繡毬圭都寺秉炬顧我老且瞶咨汝為肘臂共扶破沙盆建黃蘗宗旨是事未究竟變卒然至我方歎一夢汝已行千里挽既挽不住呼亦呼不起將謂之何處舉起火炬云元來在這裏打圓相云見麼鼻直眼橫活卓卓地高乘露地白牛車火宅門前恣遊戲毒果因西堂秉炬毒果之毒非常毒類栗棘蓬固不足儔金剛圈亦難可擬嗅著頂門裂斷幾多衲子命根覷著眼睛枯抑又見髑髏遍地今其已矣舉炬云核子尚存擲下云擲向亘天紅焰裏從教毒氣滿乾坤自讚小師惠林師孫法濟請齒豁頭童眼昏耳聾不忘所嗜乾屎橛未忍輕拋栗棘蓬以此踞叢林以此濟貧窮只緣真實不脫空故得孝子慈孫寫真而繪容奇都管請牧以卑守以規迅雷疾風鐵石不移須彌其頽隻手力持電光石火裏驅耕奪食春風和氣中摧枯拉萎極等沒意智闔國少人知知之梓府牛峯奇小師惠彰請顧我遊世間如雲在天上任緣而去住不作去住想南北信所之東西無定向為人少方便動便攔腮掌恁地去離泥水底本師如何却喚作環溪和尚雪峯化士請藞藞苴苴瀟瀟灑灑嚴冷時溫若陽春遍急處寬踰大海才開口平日說脫空却嫌人無事謗般若有時突出一句鄉談佛也不能覷他縫罅從來閩蜀本同風相逢自有知音者禪人請讚赤土𦘕簸箕冬瓜作碓觜舂碎鐵蒺藜簸出長粳米不須淘汰不須炊飽盡世人人不知太白名山天童景德禪寺住持比丘普明校正行狀師諱惟一環溪其自號資州墨池賈氏子父寵母史在娠中屢有吉徵及誕安詳年甫十歲里中大疫師與母俱患母革撫師謂其父曰吾兒雖幼器質不凡終不為人下也可善視之尋有近邑梵業寺僧覺開覩師奇相求為童子父欣然捨以事之年十二口使享泉張公方至寺見師頴悟適暮夜師張燈佛前享泉屬對曰燃燈識此燈師即應云指月知非月享泉大喜許以異日當鬻牒為子圓頂既而從叔父巨源衡甫讀書及鄉先生鄭德厚遊皆軒昂見頭角遂習舉業隨吏計偕弱冠之年享泉果以勑牒授師遂棄所學祝髮受具戒於成都甘露寺繼而往凌雲謝享泉泉勉令行腳二十二遊大慈講筵知其未為究竟於是舍而謁晦菴光公于正法訥堂辨公于六祖土菴圭公于東林皆往參決晝夜孳孳究明己事一日因三江惠上人相訪師問云風性常住無處不周古人搖扇意作麼生惠曰一時與你說了也師默然久之送惠歸至大安門道多福街而回師自謂曰古人搖扇意作麼生瞥然有省乃曰大街拾得金四鄰爭得知喜不自勝遂歸語土菴菴曰此乃楞嚴所謂見色陰銷受陰明白身心輕安無慧自禁悟則無咎非為聖證師於是喜氣頓息翌日土菴室中問師如何是佛師提起坐具菴曰有坐具即從汝無坐具時如何師與劈胸一拳菴托開曰倒來這裏捋虎鬚師云未為分外已而再從訥堂于六祖土菴于正法自是言語相契機緣吻合二老皆擊節稱賞之師以直指之學盛於南方遂問舟東下出峽首抵公安二聖未幾去遊南嶽值無二月公方入福嚴室中問師什麼物恁麼來師云不識無二云達磨來也師便珍重無二云也得也得師云莫掩彩無二笑而已尋遊廬山入浙道蘇湖至杭聞佛鑑禪師住育王道風遠播乃絶江造玉几時四方來學雲趨水赴求參堂者或纍旬月而不得間有得者如登龍門師徑懷香詣方丈相看佛鑑顧師敦厖識為法器即日歸堂衆皆驚訝後入室佛鑑問師文殊是七佛之師因甚出女子定不得師對云龍吟霧起佛鑑曰我問你下界罔明菩薩為什麼却出得女子定你定道虎嘯風生師曰某甲不恁麼佛鑑曰你又作麼生師云虎嘯風生佛鑑曰蝦跳何曾出得㪷師復應云和尚寧免疑著佛鑑便打數月後俾師侍香會佛鑑遷徑山復命知藏尋遊金陵依癡絶冲公于鐘阜者二年復歸徑山遂令師首衆淳祐丙午建寧瑞巖虗席太守待制楊公命開元清溪誼老舉有道行者主之誼舉師中選楊公敦請開堂瓣香供佛鑑俄而經略宋公茲招師住蓮峯菴未幾遷臨江之惠力又遷洪之寶峯江西運判翁公甫升師住黃龍凡五年而退藏踈山臨川守右司黃公恪請師住郡之北禪不赴繼而建昌郡守錢公應孫起師住資聖漕使洪公壽遷師住筠之黃蘗皆閲一年而退歸感山運使曹公孝慶復以洪之上藍延師辭不應命時袁之仰山虗席直指堂舉師補處省劄既下師不可得而辭凡閲五載而遷福之雪峯又五年被旨遷四明天童初天童自石帆衍公歸寂太傅平章魏國賈公入演福飯僧焦諸山公選江湖禪衲咸屬意於師及鬮拈中歡聲雷動南北兩山衲子挑包過東州以徯其來者無慮百數叢林之盛前此未之有也居無幾而寺忽丁回祿師躬櫛風沐雨分衛西州得金錢纍巨方規欲修復寺雖變故之餘安衆行道猶不少懈凡住持職任所當為者非疾病大故未嘗暫輟會至元更化諸方風靡折腰權門師獨抗節不屈故當時名公巨卿如庾使黃公震前永嘉郡守陳公蒙皆致書推稱之己卯冬師以老病謝事退居東堂先是師於丙子秋感疾遂命其徒即寺之西偏得穴地築室數椽以為歸藏之所岡巒朝向秀峙可觀因取鄉里之白蓮峯以名菴以示首丘之意辛巳秋九月旦忽誡其徒趣辦終焉計越四日索浴易衣趺坐而逝是日天大風雨雲陰晦冥翌日天色開霽四方會葬者踵相屬觀者如堵喪儀之盛前此未有龕留七日其徒奉全身葬于菴後之山不違師意也俗壽八十僧臘六十度弟子若干人嗣法若干人南華可堂悟悅為上首來者猶未艾也師為人骨相魁梧音韻洪暢面目嚴重語不妄發平居暇日端拱默坐耽耽虎視儼然人望而畏之每登猊座握塵訓徒如瓶瀉雲興曾不滯礙文質彬彬聽者忘倦室中尤無肯路未嘗輕許學者或有以偈頌呈見解者必遭詬叱無親無踈無偏無黨平生住持所得施利隨得隨捨其在東堂日復罄所有以分遺同衣併捐以助興建餘僅取足後事而已覺此嘗謂佛鑑之道如大龍普澍一雨所潤初無揀擇而卉木藥草隨其根性受益有異今佛鑑之嗣奉勑董大招提者前後背頂相望卓然在人耳目至於因果明白行解相應宗說俱通師可謂兼之矣若夫應機說法提唱宗乘則備見於九會録云覺此昔侍師側師之出處知之為詳今猥以行實見屬輒不撥荒斐敬百拜稽首直書其事述而不作將求當世之大手筆者刻諸金石以昭示不朽焉至元十九年月日住秀州海鹽天寧禪寺嗣法小師覺此狀說法不應機總是非時語今觀環溪法兄九會録可謂是應機如雷霆應時如雲雨也始從篇首終至卷末子細點校將來得非說法如雷如霆如雲如雨者耶故豫當時執侍先師見其瑞世師遂鳴鼓集衆以從上所傳三斤重底拄杖子兩手分付由是一向單提獨弄儘有餘態然後方顯授之者故不虗授而受之者亦不妄受耳覽斯録者當於言外著眼信知文不在茲乎至元癸未元正住天童弟普明跋觀夫二帙吾環溪老人平日攬醍醐為毒藥底方子西江閩浙九坐道場死盡衲子偷心可勝計哉其小師呂禪人不憚三千里持行狀來求塔銘於丞相杬翁作夏三關一日出以示余且欲為著語余曰是録丞相杬山已序其前月坡鄉翁復跋其後余何敢贅邪既不得辭於是以五彩描寫虗空耳後之中毒深者請試閲之倘或起死回生則環溪老人肉猶暖在癸未良月既望住黃龍比丘覺性書
