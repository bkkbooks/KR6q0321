body:
  text: 小參九旬禁足截鶴續鳧三月安居穿牛絡馬二千年前黃面瞿曇於一針鋒上分疆立界俾一切人依如是住從古暨今未嘗有踰越者東山自小入衆不曾受人抑勒而今四十八歲匡徒領衆只據見定三春持鉢九夏出鄉朝往羅浮暮歸檀特閙市紅塵拋沙撒土深山窮谷嘯月眠雲樓閣重新彈指間風光占斷無邊際然雖如是還有佛法道理也無咄清平世界切忌訛言結制口吸西江不與萬法為侶且居門外耳聞一喝直得三日聾未許參堂寶峰不是鑿空架虗深溝高壘蓋緣這裏無你捿泊處無你摸索處一潭湛如海龍不許蟠重關險似天鳥飛不度須是具威音王已前眼目達磨未來時機用方許升寶峯堂入寶峯室見寶峯主其或未然九十日中一任東卜西卜結制衝開碧落松千尺仰彌高鑽彌堅截斷紅塵水一溪澄不清攪不濁這裏挨得入進得步便可達顯源源截顯源流竭顯源水大顯源派攪長河為酥酪變大地作黃金撥亂乾坤掀翻海嶽有何制可結有何生可護出則無無不是入則個個歸源靜作不痕卷舒絶朕然雖如是更須知有松溪向上一路始得且道路頭在什麼處良久云苔生也除夜臘月盡是歲除夜明朝又是正月一年去年來無盡期拈拄杖云拄杖依前烏律律拄杖子我且問你老僧與你相見看看六十有餘年今年也只恁麼烏律律地明年也只恁麼烏律律地殊無長進何耶因甚得名為拄杖耶卓一下云我自塵劫以來身如枯柴不與時遷不與歲改惟守寂默不妄開言今夜既蒙發問不敢不告卓一下云我姓拄名杖子天地以我為主無我則不能覆載日月以我為主無我則不能運行四時以我為主無我則不能代謝萬物以我為主無我則不能生成貴為天子以我為主無我則不能掌握乾坤賤為庶人以我為主無我則不能成家立業三世諸佛六代祖師天下老和尚諸方善知識以我為主無我則不能說法度人五湖四海禪和子見前大衆以我為主無我則不能尋師訪道以至三千大千世界百億四天下若草若木若飛若走羽毛鱗甲含蠢蠕動以我為主無我則不能得活若有一物不以我為主而得活者無有是處以是得名為拄杖子拄杖子我看你身量不過七尺大不盈一握許多神通妙用從甚處得來卓一下云我此神通妙用不從人得當體具足用之則有不用還無若信得及便見我分上有許多神通妙用若信不及未免只道我終身烏律律地殊無長進既然如是我此寺門種種缺乏百無一有今夜除夕無可分歲何不為我一衆略施設耶卓一下云太無厭生歲夜世尊有密語嶺上梅花漏泄多時迦葉不覆藏庭前𪹼竹熾然而說恁麼會得是法住法位世間相常住歲鑰迭更而不易璇璣妙轉而不移雲峯峯頂南山雲起北山雲雪谷谷中岩上雪飛岩下雪於其中間覓一毫新舊去來之相了不可得新舊去來之相既不可得叔季精神元似舊慧慈面目只如新來年年是去年年今日日同明日日雖然只如北禪分歲烹露地白牛又作麼生良久云俗氣不除結夏橫行海上呼喚不回頭方堪禁足坐碧油幢殺人不眨眼始可護生如是踞菩薩乘如是修寂滅行如是日中一食如是夜後一𥨊如是畬田如是種粟如是而行如是而住如是而坐如是而臥如是見得透於一切處無有不如是底時節便是無足可禁無生可護無乘可踞無行可修一𥨊一食蓋是尋常種粟畬田還同遊戲雖然猶是諸方普請邊事雪峯如何良久云寒泉幸自清如鏡莫遣纖塵點污伊冬節運推移日南長至象骨峰前貞祥遍地枯木菴夜半糝花寒泉水日中鼎沸松山樹頭躍出雙雙魚磨香石上迸出長長笋今夜不免批此笋劊此魚插此花酌此泉管顧我見前一衆去也諸人因甚渾不採著卓拄杖一下云美食不中飽人喫除夜當頭坐斷不求諸聖不重己靈線路放開同乎流俗合乎汙世室內點燈且終舊歲樓頭吹角又賀新年胡張三黑李四把手同歡王大姐鄭道婆挈家相慶長裙拖地帽子指天東鄰西舍笑語喧譁水曲山坳往來絡繹處處緑楊堪繫馬家家門底挂燈毬儼然古佛家風觸目大人境界普天和氣匝地春風不離塵中獨超象外然雖如是猶是尋常行履處斬新一句又作麼生良久夜來何處火曉出古人墳解夏心同虗空界示等虗空法還有結解也無證得虗空時無是無非法還有去住也無既無結解又無去住諸人一夏在這裏行住坐臥飲食起居在這虗空內虗空外這裏揀辨得出許你證得虗空便解向虗空裡翻筋打斗七縱八橫以虎穴為伽藍將魔宮作佛事金龜潭底推開紅日象骨峯頂漲起滄溟鱉鼻拈來閃電中剔起眉毛還不見正恁麼時是法不可得非法不可得虗空亦不可得不可得亦不可得大千沙界海中漚一切聖賢如電拂雖然也須是實證得虗空始得其或未然豁達空撥因果莽莽蕩蕩招殃禍莫言不道冬節六陰剝盡寒則普天普地寒一陽復生熱則普天普地熱諸人被寒熱所轉老僧轉寒熱於目前盛夏中灑雪飛霜窮冬裡轟雷掣電火官遽嘆氷侵骨青女俄驚暖似春歲之餘閏不較後先月之大小那知晦朔臨機裁剪信意安排金剛圈栗棘蓬時時供養諸人鄭州梨青州棗不能特地施設吞得下吐得出底夜夜上元朝朝冬至慶無不宜吉無不利其或未然莫辭今夜醉動是隔年期除夜今歲今宵盡日日日從東畔出明年明日來朝朝雞向五更啼恁麼見得威音已前亦如是彌勒已後亦如是咸淳五年咸淳六年亦如是以至十年百年千年萬年萬萬年亦如是舊歲去未嘗去新歲來未嘗來梅開嶺上似昔馨香柳舞隄邊如常顏色堪笑北禪老把不定剛道年窮歲盡無可與諸人分歲且烹露地白牛炊黍米飯向榾柮火唱村田樂何也免致倚他門戶傍他墻却被時人喚作郎這老漢雖則游刃肯綮風馳電激薄批細切膾炙人口爭奈筋骨滿地狼藉直至而今收拾不上雪峰今夜不免為他收拾去也拈拄杖卓一下云狼藉愈甚結夏以大圓覺為我伽藍蝦跳不出㪷身心安居平等性智鈍鳥泊籬頭若是俊快底羅籠不住呼喚不回如倚天長劒凜凜霜寒如擘海金翅胡往不利縱橫自在舒卷無拘月沉水水沉月無可寫之蹤珠走盤盤走珠無可留之影呵叱留香尊者謾自點胸點肋竊笑斫牌玄沙未知嶺外風光一拳拳倒黃鶴樓一踢踢翻四大海雖然且道我此一衆還有個樣衲僧麼良久云喚來與老僧洗腳冬至六花峯頂光搖銀海眩生花三山城中凍合玉樓寒起粟惟有寒泉皎潔古㵎泠然澄不清攪不濁取無禁用無竭夏熱也恁麼冬寒也恁麼陰極也恁麼陽生也恁麼逗到臘月三十日明年更明年以至百千萬億年也只恁麼雖然只如祖師道瞪目不見底趙州道苦二員古佛還有優劣也無良久云夏之日冬之夜除夜臘月二十八九家家戶戶盡有不是北禪露地牛便是清源白家酒羅列杯盤同歡共笑惟有雪峰清寥寥自滴滴死火寒灰大家雖然今夜豈可空過拈拄杖云未免倩拄杖子作化菩薩前往兜率內院天廚裡許借取醍醐上味瓊漿玉液管顧我見前一衆拄杖子於是奉命而行到慈氏菩薩所頭面禮足具陳上事以七寶鉢盛滿上味而回竪起杖云見麼擲下云即今拋向諸人面前一任饜飽取足無令後悔是則是須是舌頭具眼者方可取食其或未然醍醐上味為世所珍遇斯等人翻成毒藥結夏一屙便了狼藉不堪眨上眉毛早已蹉過擊石火閃電光搆得搆不得未免喪身失命除非知有莫能知之雖然官不容針私通車馬所以道言語動用沒交涉非言語動用亦沒交涉若向言語動用中搆得是第三句非言語動用中搆得是第二句且道如何是第一句諸人若也知得當甚破草鞋其或未然百二十日長期快著腳手晝裡夜裡茶裡飯裡動裡靜裡東卜西卜看忽然卜著也不定解夏一物不為切忌坐在這裡重關既透更須轉過那邊所以道寸絲不挂赤肉猶存萬里無雲青天尚在一毫頭聖凡情念未盡未免入驢胎馬腹裡去一毫頭聖凡情念淨盡亦未免入驢胎馬腹裡去恁麼見得剋期取證掘地覓天驗定蠟人開眼作夢天童這裡萬年一念一念萬年眼挂枯松苔封古路百二十日前也恁麼百二十日後也恁麼百二十日裏也恁麼二時清水白米外斷不敢加一毫外料芻豢諸人幸而諸人水乳和同善自保愛如崑山玉似麗水金纖瑕微翳了不可得真實貴重無可議者雖然一夏空過耶不空過耶良久云幻人相逢撫掌呵呵冬節地凍天寒雙沼澄澄浸月陰剝陽復萬松吟風君子道長寒谷生春小人道消氷河起焰衲僧門下長也不可得消也不可得剝也不可得復也不可得獨超象外不墮塵中晝明夜暗此則晝夜一如春妍秋靖此則春秋不涉不是無寒暑處亦非超究竟天或謂空劫前或曰然燈後包萬有而無迹含六虗而不痕活鱍鱍絶羅籠赤灑灑脫窠臼諸人十二時中全體在裏許受用莫有知得底麼若也知得鄭州梨青州棗信手拈來東咬西咬其或未然遂高聲云侍者掇退果卓結夏踞菩薩乘蹲身荒草修寂滅行刺腦膠盆所以雲門道我事不獲已向你諸人道直下無事早是相埋沒了也何況開粥過夏商量兩錯寧免辜負自己屈物平人天童這裏只據見定玲瓏岩上石大底大小底小雨洗光生潘家園裡竹短底短長底長風來翠舞無勞揀擇不涉安排諸人一見便見九十日內飢餐渴飲倒臥橫眠有什麼過其或未然夏月多螻蟻慈悲觀地行解夏三月安居白刃滿前常坦坦九旬禁足胡塵眯目只如如如無似有降伏鏡裏魔軍將有作無成就夢中佛事牯牛嘗甘水草蠟人幸得完全且無一事到心頭但見萬松桂眼底池內游魚三個五個林間幽鳥一聲兩聲夕陽樵唱嶺頭雲靜夜漁歌江上月向上向下未曾將口輕輕道著全提半提儘教諸方浩浩商量雖然好一釜羮切忌鼠糞涴却以拂子擊禪床云今夜無端打落兩顆冬夜三玄宗要瓦礫場中不輟舉揚五位君臣斤斧聲中慣嘗拈掇玉線金針當陽顯赫電光石火觸目輝騰正偏回互繩墨下轉見乖張棒喝交馳普請處非常狼藉是處是慈氏無門無善財妙高臺塞破十虗光明藏融通三際有甚陰剝陽復暑往寒來清關別是一壺天抹過威音空劫外恁麼會得已非俊流更待小參重新告報堪作什麼雖然莫怪山翁無伎倆祇將官路當人情結制十五日已前欲證圓覺未極圓覺十五日已後終日圓覺未嘗圓覺正當十五日具足圓覺住持圓覺諸人若向這裏會得一夏九十日日日無虗弃工夫一日十二時時時有斬新活計舉足下足覺無不圓這邊那邊圓無不覺只如圓是菜園覺是牛角又作麼生良久云三十三天踢氣毬解制上無攀仰下絶己躬坐斷千差壁立萬仞激之不濁揚之不清攪之不動撥之不轉九旬禁足朝游東土暮往西天三月護生逢佛殺佛逢祖殺祖天魔落膽外道摧心凜凜神威阿誰敢擬住則便住千年推不去去則便去萬牛挽不回融大千沙界於一塵會十世古今於當念橫該竪抹七穴八穿正恁麼時如何如王寶劒隨王意揮斥縱橫得自由拈古僧問興化四方八面來時如何化云打中間底僧禮拜化云昨日赴村齊中路遇暴風卒雨却向古廟裡嚲得過師云善竊者鬼神不知興化向古廟裡嚲得過擬圖謾得這僧殊不知却被鬼神覷破要做臨論白拈種草且緩緩洞山示衆云秋初夏末兄弟東去西去公案師云洞山恁麼道全身已墮草窠裡了也石霜雖然盡力相扶畢竟也扶不起東山即不然秋初夏末兄弟東去西去切忌向萬里無寸草處去何故臥龍長怖碧潭清陳操尚書一日訪資福福見來便𦘕一圓相尚書云弟子恁麼來早是不著便那堪更𦘕圓相福於中著一點尚書云將謂是南蕃船主資福便歸方丈閉却門師云大開東閣延接高賓資福手頭不吝進之以禮退